<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>智囊团 · 问问他们</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@300;400;600&family=Noto+Sans+SC:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #060606;
      --ink: #f6f0e7;
      --muted: #8e8477;
      --line: rgba(212, 175, 123, 0.18);
      --accent: #d4af7b;
      --accent-light: rgba(212, 175, 123, 0.12);
      --card-bg: rgba(255,255,255,0.06);
      --font-serif: 'Noto Serif SC', 'STSong', 'SimSun', serif;
      --font-sans: 'Noto Sans SC', 'PingFang SC', sans-serif;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

    html { scroll-behavior: smooth; }

    body {
      background:
        radial-gradient(circle at 50% 20%, rgba(212,175,123,0.08), transparent 26%),
        linear-gradient(180deg, #090909, #040404 58%);
      color: var(--ink);
      font-family: var(--font-sans);
      min-height: 100vh;
      overflow-x: hidden;
    }
    body.result-mode {
      overflow: hidden;
    }
    body.result-mode .wrap {
      max-width: none;
      width: 100%;
      padding: 0;
    }
    body.result-mode .home-hero,
    body.result-mode .divider-wrap,
    body.result-mode .footer {
      display: none;
    }

    /* ── MAIN WRAP ── */
    .wrap {
      position: relative;
      z-index: 1;
      max-width: none;
      margin: 0 auto;
      padding: 0;
    }

    /* ── HOME HERO ── */
    .home-hero {
      position: relative;
      min-height: 100vh;
      padding: 28px clamp(18px, 3vw, 38px) 42px;
      overflow: hidden;
      isolation: isolate;
    }
    .home-hero::before {
      content: '';
      position: absolute;
      inset: 0;
      background:
        radial-gradient(circle at 20% 28%, rgba(74,65,130,0.24), transparent 18%),
        radial-gradient(circle at 78% 62%, rgba(74,65,130,0.22), transparent 16%),
        radial-gradient(circle at 68% 26%, rgba(212,175,123,0.14), transparent 18%);
      pointer-events: none;
      z-index: 0;
    }
    .home-hero::after {
      content: '';
      position: absolute;
      inset: 0;
      background-image: radial-gradient(rgba(255,255,255,0.06) 0.8px, transparent 0.8px);
      background-size: 28px 28px;
      opacity: 0.16;
      pointer-events: none;
      z-index: 0;
      mask-image: linear-gradient(180deg, rgba(0,0,0,0.5), transparent 82%);
      -webkit-mask-image: linear-gradient(180deg, rgba(0,0,0,0.5), transparent 82%);
    }
    header {
      position: relative;
      z-index: 2;
      padding: 0;
      text-align: left;
    }
    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 20px;
      min-height: 66px;
    }
    .brand {
      display: inline-flex;
      align-items: center;
      gap: 14px;
      color: var(--ink);
      text-decoration: none;
    }
    .brand-mark {
      width: 44px;
      height: 44px;
      border-radius: 50%;
      border: 1px solid rgba(212,175,123,0.28);
      display: inline-flex;
      align-items: center;
      justify-content: center;
      background: rgba(255,255,255,0.03);
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.06);
    }
    .brand-copy {
      display: flex;
      flex-direction: column;
      gap: 4px;
    }
    .logo {
      font-family: var(--font-serif);
      font-size: 1.3rem;
      font-weight: 500;
      letter-spacing: 0.12em;
      color: var(--ink);
      line-height: 1;
    }
    .tagline {
      font-size: 0.55rem;
      color: rgba(246,240,231,0.62);
      letter-spacing: 0.28em;
      font-weight: 400;
      text-transform: uppercase;
      margin-top: 0;
    }
    .nav-links {
      display: flex;
      align-items: center;
      gap: clamp(20px, 3vw, 42px);
    }
    .nav-links a {
      color: rgba(246,240,231,0.76);
      text-decoration: none;
      font-size: 0.82rem;
      letter-spacing: 0.08em;
      transition: color 0.25s ease;
    }
    .nav-links a:hover,
    .nav-links a.is-active {
      color: var(--accent);
    }
    .nav-actions {
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .nav-btn {
      padding: 11px 18px;
      border-radius: 12px;
      border: 1px solid rgba(255,255,255,0.12);
      color: rgba(246,240,231,0.82);
      font-size: 0.76rem;
      background: rgba(255,255,255,0.03);
      text-decoration: none;
      transition: all 0.25s ease;
    }
    .nav-btn.accent {
      background: linear-gradient(135deg, rgba(212,175,123,0.96), rgba(181,136,72,0.96));
      color: #17110a;
      border-color: transparent;
    }
    .nav-btn:hover {
      transform: translateY(-1px);
      border-color: rgba(212,175,123,0.26);
    }
    .hero-center {
      position: relative;
      z-index: 2;
      min-height: calc(100vh - 100px);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 42px 0 24px;
    }
    .hero-panel {
      width: min(680px, calc(100vw - 36px));
      text-align: center;
    }
    .hero-kicker {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      padding: 8px 14px;
      border-radius: 999px;
      border: 1px solid rgba(212,175,123,0.18);
      background: rgba(255,255,255,0.04);
      color: rgba(246,240,231,0.72);
      font-size: 0.66rem;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
    }
    .hero-kicker::before {
      content: '';
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: var(--accent);
      box-shadow: 0 0 0 6px rgba(212,175,123,0.12);
    }
    .hero-title {
      margin-top: 26px;
      font-family: var(--font-serif);
      font-size: clamp(2.8rem, 6vw, 4.8rem);
      line-height: 1.15;
      letter-spacing: 0.04em;
      color: #fff7ef;
      text-shadow: 0 12px 34px rgba(0,0,0,0.34);
    }
    .hero-title em {
      color: var(--accent);
      font-style: normal;
      font-weight: 600;
    }
    .hero-subtitle {
      width: min(520px, 86%);
      margin: 18px auto 0;
      color: rgba(246,240,231,0.66);
      font-size: 1rem;
      line-height: 1.9;
      letter-spacing: 0.04em;
    }

    /* ── INPUT SECTION ── */
    .input-section {
      position: relative;
      z-index: 2;
      width: min(720px, 100%);
      margin: 34px auto 0;
      padding-bottom: 0;
    }
    .input-label {
      font-size: 0.72rem;
      color: rgba(246,240,231,0.54);
      letter-spacing: 0.14em;
      display: block;
      margin-bottom: 14px;
      text-transform: uppercase;
    }
    .input-panel {
      position: relative;
      padding: 0;
      border: 0;
      background: transparent;
      box-shadow: none;
      backdrop-filter: none;
      -webkit-backdrop-filter: none;
      overflow: visible;
    }
    .input-box {
      position: relative;
      z-index: 1;
      width: 100%;
      background:
        linear-gradient(180deg, rgba(255,255,255,0.14), rgba(255,255,255,0.04) 34%, rgba(255,255,255,0.03)),
        linear-gradient(135deg, rgba(255,255,255,0.08), rgba(255,255,255,0.02));
      border: 1px solid rgba(255,255,255,0.2);
      border-radius: 22px;
      padding: 24px 148px 24px 24px;
      font-size: 1rem;
      font-family: var(--font-sans);
      color: #f8f3ed;
      resize: none;
      outline: none;
      transition: border-color 0.3s, box-shadow 0.3s, background 0.3s;
      min-height: 108px;
      line-height: 1.8;
      box-shadow:
        0 18px 40px rgba(0,0,0,0.18),
        inset 0 1px 0 rgba(255,255,255,0.22),
        inset 0 -1px 0 rgba(255,255,255,0.04);
      backdrop-filter: blur(24px) saturate(155%);
      -webkit-backdrop-filter: blur(24px) saturate(155%);
    }
    .input-box:focus {
      border-color: rgba(255,255,255,0.32);
      box-shadow:
        0 0 0 3px rgba(255,255,255,0.045),
        0 22px 44px rgba(0,0,0,0.2),
        inset 0 1px 0 rgba(255,255,255,0.26),
        inset 0 -1px 0 rgba(255,255,255,0.05);
      background:
        linear-gradient(180deg, rgba(255,255,255,0.16), rgba(255,255,255,0.05) 34%, rgba(255,255,255,0.04)),
        linear-gradient(135deg, rgba(255,255,255,0.09), rgba(255,255,255,0.03));
    }
    .input-box::placeholder { color: rgba(246,240,231,0.34); }
    .char-count {
      text-align: right;
      font-size: 0.72rem;
      color: rgba(246,240,231,0.3);
      margin-top: 10px;
      font-weight: 300;
    }

    /* ── CATEGORY CHIPS ── */
    .chips {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 10px;
      margin-top: 18px;
    }
    .chip {
      padding: 9px 16px;
      border-radius: 24px;
      font-size: 0.74rem;
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.08);
      color: rgba(246,240,231,0.64);
      cursor: pointer;
      transition: all 0.25s ease;
      user-select: none;
      letter-spacing: 0.04em;
    }
    .chip:hover {
      border-color: var(--accent);
      color: var(--accent);
      transform: translateY(-1px);
    }
    .chip.selected {
      background: rgba(212,175,123,0.14);
      color: #fff3e2;
      border-color: rgba(212,175,123,0.3);
      transform: translateY(-1px);
    }
    .chip svg { margin-right: 5px; vertical-align: -2px; }

    /* ── SUBMIT ── */
    .submit-btn {
      position: absolute;
      right: 26px;
      top: 50%;
      z-index: 3;
      transform: translateY(-50%);
      min-width: 104px;
      height: 52px;
      padding: 0 18px;
      border-radius: 999px;
      background: linear-gradient(135deg, rgba(212,175,123,0.96), rgba(180,131,68,0.96));
      color: #17110a;
      border: none;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      font-size: 0.8rem;
      font-weight: 600;
      letter-spacing: 0.08em;
      font-family: var(--font-sans);
      cursor: pointer;
      margin-top: 0;
      transition: transform 0.25s ease, box-shadow 0.25s ease, opacity 0.25s ease;
      overflow: hidden;
      box-shadow: 0 18px 30px rgba(129,88,28,0.24);
    }
    .submit-btn::after {
      content: '->';
      font-size: 0.95rem;
      font-weight: 700;
    }
    .submit-btn:hover {
      transform: translateY(-50%) scale(1.04);
      box-shadow: 0 22px 36px rgba(129,88,28,0.3);
    }
    .submit-btn:active { transform: translateY(-50%) scale(0.98); }
    .submit-btn:disabled {
      opacity: 0.62;
      cursor: not-allowed;
      transform: translateY(-50%);
      box-shadow: 0 10px 20px rgba(129,88,28,0.12);
    }

    .hero-notes {
      margin-top: 18px;
      display: flex;
      justify-content: center;
      gap: 10px;
      flex-wrap: wrap;
      color: rgba(246,240,231,0.44);
      font-size: 0.72rem;
    }
    .hero-note {
      padding: 6px 12px;
      border-radius: 999px;
      background: rgba(255,255,255,0.03);
      border: 1px solid rgba(255,255,255,0.06);
    }
    .api-status {
      min-height: 20px;
      margin-top: 14px;
      font-size: 0.76rem;
      letter-spacing: 0.04em;
      color: rgba(246,240,231,0.48);
      transition: color 0.25s ease, opacity 0.25s ease;
    }
    .api-status.error {
      color: #f3a8a0;
    }
    .api-status.success {
      color: #d4af7b;
    }

    /* ── DIVIDER ── */
    .divider-wrap { display: none; }

    .home-figures {
      position: absolute;
      inset: 110px 0 0;
      pointer-events: none;
      z-index: 1;
    }
    .home-figure {
      position: absolute;
      width: clamp(150px, 17vw, 250px);
      opacity: 0.9;
      filter: grayscale(0.08) contrast(1.02);
    }
    .home-figure::before,
    .home-figure::after {
      content: '';
      position: absolute;
      border-radius: 50%;
      z-index: -1;
    }
    .home-figure::before {
      width: 78%;
      height: 34%;
      background: rgba(74,65,130,0.72);
      left: 8%;
      top: 18%;
    }
    .home-figure::after {
      width: 42%;
      height: 28%;
      background: rgba(212,175,123,0.84);
      right: 0;
      bottom: 12%;
    }
    .home-figure img {
      width: 100%;
      display: block;
      object-fit: contain;
      filter: drop-shadow(0 18px 34px rgba(0,0,0,0.28));
    }
    .home-figure .signature {
      position: absolute;
      color: rgba(212,175,123,0.82);
      font-family: var(--font-serif);
      font-size: clamp(1rem, 1.8vw, 1.6rem);
      font-style: italic;
      line-height: 1.05;
      letter-spacing: 0.04em;
    }
    .figure-left-top { left: 3%; top: 2%; transform: rotate(-4deg); }
    .figure-left-top .signature { right: -8%; top: 18%; }
    .figure-left-bottom { left: 2%; bottom: 2%; width: clamp(160px, 18vw, 270px); transform: rotate(-6deg); }
    .figure-left-bottom .signature { left: -2%; bottom: 12%; }
    .figure-right-top { right: 6%; top: 12%; width: clamp(150px, 16vw, 230px); transform: rotate(5deg); }
    .figure-right-top .signature { left: -10%; top: 18%; }
    .figure-right-bottom { right: 8%; bottom: 0; width: clamp(170px, 19vw, 290px); transform: rotate(3deg); }
    .figure-right-bottom .signature { right: -8%; top: 14%; }
    .figure-bottom-center { left: 50%; bottom: -2%; width: clamp(140px, 14vw, 210px); transform: translateX(-50%); opacity: 0.84; }
    .figure-bottom-center .signature { right: -18%; top: 36%; }

    /* ── CARDS — centered fan deck ── */
    .cards {
      display: none;
      position: relative;
      margin-top: 8px;
    }
    .cards.show { display: block; }
    body.result-mode .cards {
      position: fixed;
      inset: 0;
      z-index: 5;
      margin: 0;
    }
    body.result-mode .cards.show {
      display: block;
    }

    .cards-stage {
      position: relative;
      width: 100%;
      max-width: min(1120px, calc(100vw - 32px));
      margin: 0 auto;
      padding: 26px 0 18px;
      border-radius: 34px;
      background:
        radial-gradient(circle at top, rgba(255,255,255,0.72), rgba(255,255,255,0) 56%),
        linear-gradient(180deg, rgba(255,255,255,0.8), rgba(255,255,255,0.44));
      border: 1px solid rgba(232,232,228,0.92);
      backdrop-filter: blur(24px);
      -webkit-backdrop-filter: blur(24px);
      box-shadow:
        0 28px 90px rgba(26,26,26,0.08),
        inset 0 1px 0 rgba(255,255,255,0.9);
      overflow: hidden;
    }
    body.result-mode .cards-stage {
      width: 100vw;
      max-width: none;
      min-height: 100vh;
      border-radius: 0;
      padding-top: max(24px, env(safe-area-inset-top));
      padding-bottom: max(24px, env(safe-area-inset-bottom));
      background:
        radial-gradient(circle at top, rgba(255,255,255,0.72), rgba(255,255,255,0) 52%),
        linear-gradient(180deg, rgba(250,250,248,0.96), rgba(244,241,236,0.92));
    }
    .cards-stage::before {
      content: '';
      position: absolute;
      inset: 1px;
      border-radius: 33px;
      border: 1px solid rgba(255,255,255,0.7);
      pointer-events: none;
    }
    body.result-mode .cards-stage::before {
      inset: 0;
      border-radius: 0;
      border: none;
    }
    .cards-stage-glow {
      position: absolute;
      inset: -10% -6% auto;
      height: 300px;
      background:
        radial-gradient(circle at 18% 30%, rgba(196,149,106,0.24), transparent 40%),
        radial-gradient(circle at 82% 6%, rgba(255,255,255,0.88), transparent 34%);
      filter: blur(10px);
      opacity: 0.95;
      pointer-events: none;
    }
    .deck-status {
      position: relative;
      z-index: 2;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 10px;
      padding: 0 20px 10px;
      text-align: center;
    }
    body.result-mode .deck-status {
      padding-top: 10px;
      padding-bottom: 0;
    }
    .deck-kicker {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 7px 14px;
      border-radius: 999px;
      background: rgba(196,149,106,0.08);
      border: 1px solid rgba(196,149,106,0.12);
      color: var(--accent);
      font-size: 0.64rem;
      letter-spacing: 0.18em;
    }
    .deck-kicker::before {
      content: '';
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--accent);
      box-shadow: 0 0 0 6px rgba(196,149,106,0.08);
    }
    .deck-hint {
      font-size: 0.74rem;
      color: var(--muted);
      letter-spacing: 0.16em;
      line-height: 1.7;
      transition: opacity 0.3s ease, transform 0.3s ease;
    }
    .cards-stage.stack-mode .deck-hint {
      animation: hintPulse 2.2s ease-in-out infinite;
    }

    .cards-deck-shell {
      position: relative;
      padding: 0 0 6px;
      perspective: 1600px;
      perspective-origin: 50% 38%;
    }
    body.result-mode .cards-deck-shell {
      min-height: calc(100vh - 120px);
      display: flex;
      align-items: center;
    }
    .cards-track {
      position: relative;
      display: flex;
      justify-content: center;
      align-items: flex-start;
      min-height: 590px;
      padding: 34px clamp(16px, 4vw, 38px) 92px;
      overflow-x: hidden;
      overflow-y: visible;
      scrollbar-width: none;
      -ms-overflow-style: none;
      touch-action: pan-x;
      cursor: default;
      scroll-behavior: smooth;
      transition: gap 0.72s cubic-bezier(0.22,1,0.36,1), padding 0.72s cubic-bezier(0.22,1,0.36,1), justify-content 0.72s ease;
    }
    body.result-mode .cards-track {
      width: 100%;
      min-height: calc(100vh - 150px);
      align-items: center;
      padding-top: 24px;
      padding-bottom: 130px;
    }
    .cards-track::-webkit-scrollbar { display: none; }
    .cards-track.is-dragging {
      cursor: grabbing;
      user-select: none;
    }
    .cards-stage.stack-mode .cards-track {
      cursor: pointer;
    }
    .cards-stage.spread .cards-track {
      justify-content: flex-start;
      gap: 22px;
      overflow-x: auto;
      padding-left: clamp(18px, 4vw, 42px);
      padding-right: clamp(18px, 6vw, 60px);
    }

    .card {
      --card-lift: 0px;
      --card-rotate: 0deg;
      flex: 0 0 clamp(226px, 24vw, 286px);
      width: clamp(226px, 24vw, 286px);
      aspect-ratio: 5 / 7;
      height: auto;
      margin-left: 0;
      border-radius: 28px;
      background: transparent;
      border: 1px solid transparent;
      overflow: hidden;
      position: relative;
      cursor: pointer;
      transform: translateY(var(--card-lift)) rotateZ(var(--card-rotate)) rotateX(var(--tilt-x, 0deg)) rotateY(var(--tilt-y, 0deg));
      transform-origin: center 88%;
      transform-style: preserve-3d;
      will-change: transform;
      transition:
        transform 0.78s cubic-bezier(0.22,1,0.36,1),
        margin 0.78s cubic-bezier(0.22,1,0.36,1),
        box-shadow 0.45s ease,
        border-color 0.35s ease,
        filter 0.35s ease;
      box-shadow:
        0 22px 54px rgba(26,26,26,0.12),
        0 8px 16px rgba(26,26,26,0.05);
      filter: saturate(0.98);
      z-index: var(--stack-z, 1);
    }
    .cards-stage.stack-mode .card {
      --card-lift: var(--stack-rise, 0px);
      --card-rotate: var(--stack-rotate, 0deg);
      margin-left: calc(-1 * clamp(132px, 13vw, 168px));
    }
    .cards-stage.stack-mode .card:first-child {
      margin-left: 0;
    }
    .cards-stage.spread .card {
      --card-lift: 0px;
      --card-rotate: var(--spread-rotate, 0deg);
      margin-left: 0;
      z-index: 2;
    }
    .cards-stage.is-dealing .card {
      animation: fanDealIn 0.88s var(--deal-delay, 0s) cubic-bezier(0.16,1,0.3,1) both;
      pointer-events: none;
    }
    .card::before {
      content: none;
      position: absolute;
      inset: 0;
      border-radius: 28px;
      background:
        linear-gradient(136deg, rgba(255,255,255,0.62), rgba(255,255,255,0.08) 42%, transparent 70%),
        radial-gradient(circle 160px at var(--mx, 50%) var(--my, 50%), rgba(196,149,106,0.12), transparent 70%);
      opacity: 0.84;
      pointer-events: none;
      z-index: 0;
    }
    .card::after {
      content: none;
      position: absolute;
      inset: 1px;
      border-radius: 27px;
      border: 1px solid rgba(196,149,106,0.12);
      pointer-events: none;
      z-index: 4;
      transition: border-color 0.3s ease, opacity 0.3s ease;
      opacity: 0.78;
    }
    .card:hover,
    .card.is-active {
      filter: saturate(1.05);
      box-shadow:

    @keyframes scrollBounce {
      0%, 100% { transform: translateX(0); }
      50% { transform: translateX(7px); }

      0% {
        opacity: 0;

      to {

      padding: 0 24px;
      background: linear-gradient(180deg, rgba(250,250,248,0.96), rgba(245,241,236,0.96));
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
    }
    body.result-mode .loading.show {

    }
    .shuffle-stage {
      position: relative;
      width: min(360px, 78vw);
      height: 230px;
      margin: 0 auto 30px;
    }
    .shuffle-shadow {
      position: absolute;
      left: 50%;
      bottom: 18px;
      width: 220px;

function escapeHTML(value) {
  return String(value).replace(/[&<>"']/g, (char) => ({
    '&': '&amp;',
    '<': '&lt;',
    '>': '&gt;',
    '"': '&quot;',
    "'": '&#39;'
  }[char]));
}

function showStatus(message, type = '') {
  apiStatus.textContent = message || '';
  apiStatus.className = `api-status${type ? ` ${type}` : ''}`;
}

function normalizeApiErrorMessage(message) {
  const text = String(message || '').trim();
  if (!text) {
    return '请求失败，请稍后重试。';
  }
  if (/Insufficient Balance/i.test(text)) {
    return 'DeepSeek 账户余额不足，推荐卡牌可正常使用，但实时回答暂时无法生成。';
  }
  if (/DEEPSEEK_API_KEY is not configured/i.test(text)) {
    return '后端未配置 DeepSeek API Key，暂时无法生成实时回答。';
  }
  if (/Failed to fetch/i.test(text)) {
    return '无法连接本地后端，请确认 8000 端口服务已启动。';
  }
  return text;
}

function renderPosterWords(lines) {
  return lines.map((line) => `<span>${escapeHTML(line)}</span>`).join('');
}

function wait(ms) {
  return new Promise((resolve) => {
    setTimeout(resolve, ms);
  });
}

function nextFrame() {
  return new Promise((resolve) => {
    requestAnimationFrame(() => resolve());
  });
}

function getCardStyle(index, total) {
  const stack = STACK_PRESETS[index] || STACK_PRESETS[STACK_PRESETS.length - 1];

  return [
    `--stack-rise:${stack.rise}px`,
    `--stack-rotate:${stack.rotate}deg`,
    `--stack-z:${total - index}`,
    `--spread-rotate:${stack.spreadRotate}deg`,
    `--deal-delay:${(index * 0.12).toFixed(2)}s`
  ].join(';');
}

function buildPromptQuestion() {
  const content = state.question.trim();
  return state.category ? `${content}\n\n问题类型：${state.category}` : content;
}

function getDomainColors(domain) {
  return DOMAIN_COLORS[domain] || DOMAIN_COLORS.default;
}

function toPosterTitle(englishName, chineseName) {
  const staticConfig = CELEBRITIES[chineseName];
  if (staticConfig && staticConfig.posterTitle) {
    return staticConfig.posterTitle;
  }

  const cleanEnglish = String(englishName || '')
    .toUpperCase()
    .replace(/[^A-Z\s-]/g, ' ')
    .split(/[\s-]+/)
    .filter(Boolean)
    .slice(0, 3);

  if (cleanEnglish.length) {
    return cleanEnglish;
  }

  if (!chineseName) {
    return ['THINK', 'TANK'];
  }

  if (chineseName.length <= 2) {
    return [chineseName];
  }

  return [chineseName.slice(0, 2), chineseName.slice(2, 4) || ''];
}

function buildPortraitFallback(name, domain) {
  const initials = (name || '智囊').slice(0, 2);
  const [primary, secondary] = getDomainColors(domain);
  const svg = `
    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 420">
      <defs>
        <linearGradient id="g" x1="0" x2="1" y1="0" y2="1">
          <stop offset="0%" stop-color="${primary}"/>
          <stop offset="100%" stop-color="${secondary}"/>
        </linearGradient>
      </defs>
      <rect width="320" height="420" rx="34" fill="url(#g)"/>
      <circle cx="160" cy="150" r="74" fill="rgba(255,255,255,0.16)"/>
      <path d="M70 356c22-60 66-92 90-92s68 32 90 92" fill="rgba(255,255,255,0.16)"/>
      <text x="160" y="384" fill="rgba(255,255,255,0.9)" font-size="34" font-family="Arial, sans-serif" text-anchor="middle">${escapeHTML(initials)}</text>
    </svg>
  `;
  return `data:image/svg+xml;charset=UTF-8,${encodeURIComponent(svg)}`;
}

function normalizePortrait(path, name, domain) {
  if (path) {
    if (/^(https?:|data:)/.test(path)) {
      return path;
    }
    return path.replace(/^\.?\//, '');
  }

  const fallback = CELEBRITIES[name];
  if (fallback && fallback.image) {
    return fallback.image;
  }

  return buildPortraitFallback(name, domain);
}

function pickTags(detail, rec) {
  const staticConfig = CELEBRITIES[detail.chinese_name];
  const source = [
    ...(detail.preferred_topics || []),
    ...(detail.persona_traits || []),
    detail.domain_category,
    detail.ai_archetype,
    ...(staticConfig ? staticConfig.tags : [])
  ]
    .map((item) => String(item || '').trim())
    .filter(Boolean);

  return [...new Set(source)].slice(0, 4);
}

function normalizeItems(items, limit = 4) {
  return [...new Set((items || []).map((item) => String(item || '').trim()).filter(Boolean))].slice(0, limit);
}

function buildBackFooter(card) {
  if (card.loadingAnswer) {
    return '正在根据人物档案和知识片段生成回答...';

  if (card.answer && card.citations.length) {
    return `已结合 ${card.citations.length} 条知识片段生成回应。`;
  }

  if (card.error) {
    return '你可以再次点击这张卡，或检查后端与模型配置后重试。';
  }

  return '点击翻面后，会基于人物设定和知识库生成这一位智囊的实时回答。';
}

function buildAnswerTitle(card) {
  if (card.loadingAnswer) {

  if (card.error) {

function buildQuote(card) {

    image: normalizePortrait(detail.portrait_asset, detail.chinese_name || rec.person_name, detail.domain_category),
    title: staticConfig.title || intro,

    exp: staticConfig.exp || rec.reason,
    reason: rec.reason,
    answer: '',
    error: '',

}

async function apiFetch(path, options = {}) {
  const requestOptions = {
    method: options.method || 'GET',
    headers: {
      'Content-Type': 'application/json',
      ...(options.headers || {})
    }
  };

  if (options.body !== undefined) {
    requestOptions.body = typeof options.body === 'string'
      ? options.body
      : JSON.stringify(options.body);
  }

  const response = await fetch(`${API_BASE}${path}`, requestOptions);
  const text = await response.text();
  let payload = {};

  if (text) {
    try {
      payload = JSON.parse(text);
    } catch (error) {
      payload = { detail: text };
    }
  }

  if (!response.ok) {
    throw new Error(normalizeApiErrorMessage(payload.detail || `请求失败（${response.status}）`));
  }

  return payload;
}

async function fetchRecommendedCards() {
  const recommendData = await apiFetch('/recommend', {
    method: 'POST',
    body: {
      question: state.promptQuestion,
      top_k: 4
    }
  });

  const recommendations = (recommendData.recommendations || []).slice(0, 4);
  if (!recommendations.length) {
    throw new Error('后端没有返回可展示的智囊卡牌。');
  }

  const detailResults = await Promise.allSettled(
    recommendations.map((item) => apiFetch(`/people/${encodeURIComponent(item.person_slug)}`))
  );

  return recommendations.map((rec, index) => {
    const detailResult = detailResults[index];
    const detail = detailResult.status === 'fulfilled'
      ? detailResult.value
      : {
          slug: rec.person_slug,
          english_name: rec.person_name,
          chinese_name: rec.person_name,
          domain_category: 'default',
          ai_archetype: '',
          brief_intro: rec.reason,
          portrait_asset: null,
          is_fictional: false,
          era_context: null,
          status: 'active',
          preferred_topics: [],
          persona_traits: []
        };

    return buildCardViewModel(rec, detail);
  });
}

function syncCardDOM(index) {

  const answerTitleEl = cardNode.querySelector('.back-answer-label');
  const answerEl = cardNode.querySelector('.back-answer');
  const expEl = cardNode.querySelector('.back-exp');
  const citationsEl = cardNode.querySelector('.back-citations');

  answerTitleEl.textContent = buildAnswerTitle(cardData);
  answerEl.textContent = buildQuote(cardData);
  expEl.textContent = buildBackFooter(cardData);
  citationsEl.innerHTML = buildCitationMarkup(cardData);
}

async function ensureCardAnswer(index) {
  const cardData = state.currentCards[index];
  if (!cardData || cardData.loadingAnswer || cardData.answer) {
    return;
  }

  cardData.loadingAnswer = true;
  cardData.error = '';
  syncCardDOM(index);

  try {
    const response = await apiFetch('/chat/respond', {
      method: 'POST',
      body: {
        person_slug: cardData.slug,
        question: state.promptQuestion,
        history: [],
        conversation_id: cardData.conversationId
      }
    });

    cardData.answer = response.answer || '';
    cardData.conversationId = response.conversation_id || null;
    cardData.citations = response.citations || [];
    showStatus(`已接入后端：${cardData.name} 的回答已生成。`, 'success');
  } catch (error) {
    cardData.error = normalizeApiErrorMessage(error.message || '获取回答失败，请稍后重试。');
  } finally {
    cardData.loadingAnswer = false;
    syncCardDOM(index);
  }
}

  const track = document.getElementById('cardsTrack');
  const scrollHint = document.getElementById('scrollHint');
  const deckHint = document.getElementById('deckHint');
  const cards = Array.from(stage.querySelectorAll('.card'));
  let isSpread = false;
  let activeIndex = 0;
  let flippedIndex = -1;
  let isDragging = false;
  let suppressClick = false;
  let startX = 0;
  let startScrollLeft = 0;

  function focusCard(index, smooth = true) {
    activeIndex = index;
    cards.forEach((card, cardIndex) => {
      card.classList.toggle('is-active', isSpread && cardIndex === index);
    });

    if (isSpread && cards[index]) {
      cards[index].scrollIntoView({
        behavior: smooth ? 'smooth' : 'auto',
        inline: 'center',
        block: 'nearest'
      });
    }
  }

  function setFlipped(index, shouldFlip) {
    cards.forEach((card, cardIndex) => {
      card.classList.toggle('is-flipped', shouldFlip && cardIndex === index);
    });
    flippedIndex = shouldFlip ? index : -1;
  }

  function setSpread(nextSpread, smooth = true) {
    isSpread = nextSpread;
    stage.classList.toggle('spread', nextSpread);
    stage.classList.toggle('stack-mode', !nextSpread);
    scrollHint.classList.toggle('show', nextSpread);
    deckHint.textContent = nextSpread
      ? '左右拖动浏览牌阵 · 点击单张卡牌翻到背面并请求真实回答'
      : '牌阵已收拢 · 点击这叠卡牌展开查看';

    if (nextSpread) {
      requestAnimationFrame(() => focusCard(activeIndex, smooth));
    } else {
      cards.forEach((card) => card.classList.remove('is-active'));
      setFlipped(-1, false);
      track.scrollTo({ left: 0, behavior: smooth ? 'smooth' : 'auto' });
    }
  }

  track.addEventListener('pointerdown', (event) => {
    if (!isSpread) return;
    isDragging = true;
    suppressClick = false;
    startX = event.clientX;
    startScrollLeft = track.scrollLeft;
    track.classList.add('is-dragging');
  });

  track.addEventListener('pointermove', (event) => {
    if (!isDragging) return;
    const delta = event.clientX - startX;
    if (Math.abs(delta) > 6) {
      suppressClick = true;
    }
    track.scrollLeft = startScrollLeft - delta;
  });

  function stopDragging() {
    if (!isDragging) return;
    isDragging = false;
    track.classList.remove('is-dragging');
    setTimeout(() => {
      suppressClick = false;
    }, 30);
  }

  track.addEventListener('pointerup', stopDragging);
  track.addEventListener('pointerleave', stopDragging);
  track.addEventListener('pointercancel', stopDragging);
  stage.addEventListener('click', () => {
    if (!isSpread && !suppressClick) {
      setSpread(true, false);
    }
  });

  cards.forEach((card) => {
    const index = Number(card.dataset.index);

    card.addEventListener('click', async (event) => {
      event.stopPropagation();
      if (suppressClick) return;
      if (!isSpread) {
        focusCard(index, false);
        setSpread(true);
        return;
      }
      focusCard(index);
      if (flippedIndex === index) {
        setFlipped(index, false);
      } else {
        setFlipped(index, true);
        await ensureCardAnswer(index);
      }
    });

    card.addEventListener('mousemove', (event) => {
      const rect = card.getBoundingClientRect();
      const mx = ((event.clientX - rect.left) / rect.width * 100).toFixed(1);
      const my = ((event.clientY - rect.top) / rect.height * 100).toFixed(1);
      const rotateY = (((event.clientX - rect.left) / rect.width) - 0.5) * 10;
      const rotateX = (((event.clientY - rect.top) / rect.height) - 0.5) * -8;
      card.style.setProperty('--mx', `${mx}%`);
      card.style.setProperty('--my', `${my}%`);
      card.style.setProperty('--tilt-x', `${rotateX.toFixed(2)}deg`);
      card.style.setProperty('--tilt-y', `${rotateY.toFixed(2)}deg`);
    });

    card.addEventListener('mouseleave', () => {
      card.style.setProperty('--mx', '50%');
      card.style.setProperty('--my', '50%');
      card.style.setProperty('--tilt-x', '0deg');
      card.style.setProperty('--tilt-y', '0deg');
    });
  });

  cards.forEach((card) => card.classList.remove('is-active'));
  setTimeout(() => {
    stage.classList.remove('is-dealing');
  }, 1100);
}

async function generateCards() {
  state.question = input.value;
  if (state.question.trim().length < 5 || state.requestInFlight) return;

  state.promptQuestion = buildPromptQuestion();
  state.requestInFlight = true;
  submitBtn.disabled = true;
  showStatus('正在连接后端推荐接口...', '');

  document.body.classList.add('result-mode');
  inputSection.style.display = 'none';
  loading.classList.add('show');
  cardsEl.classList.remove('show');
  resetBtn.classList.remove('show');

  try {
    // Let the browser paint the loading overlay before kicking off network work.
    await nextFrame();
    await wait(80);

    const [recommendedCards] = await Promise.all([
      fetchRecommendedCards(),
      wait(MIN_SHUFFLE_DURATION)
    ]);
    state.currentCards = recommendedCards;
    loading.classList.remove('show');
    renderCards(state.currentCards);
    cardsEl.classList.add('show');
    resetBtn.classList.add('show');
    showStatus('后端联调成功：推荐人物已从人物库实时返回。', 'success');

    setTimeout(() => {
      cardsEl.scrollIntoView({ behavior: 'smooth', block: 'start' });
    }, 120);
  } catch (error) {
    loading.classList.remove('show');
    document.body.classList.remove('result-mode');
    inputSection.style.display = 'block';
    showStatus(normalizeApiErrorMessage(error.message || '联调失败，请检查本地后端服务。'), 'error');
  } finally {
    state.requestInFlight = false;
    submitBtn.disabled = input.value.trim().length < 5;
  }
}

// ─── INPUT ───
input.addEventListener('input', function() {
  state.question = this.value;
  charCount.textContent = state.question.length;
  submitBtn.disabled = state.question.trim().length < 5;
  if (apiStatus.textContent) {
    showStatus('', '');
  }
});

input.addEventListener('keydown', (event) => {
  if ((event.metaKey || event.ctrlKey) && event.key === 'Enter') {
    generateCards();
  }
});

chips.forEach((chip) => {
  chip.addEventListener('click', () => {
    const isSelected = chip.classList.contains('selected');
    chips.forEach((item) => item.classList.remove('selected'));
    if (isSelected) {
      state.category = '';
      return;
    }
    chip.classList.add('selected');
    state.category = chip.dataset.cat;
  });
});

submitBtn.addEventListener('click', generateCards);

function resetAll() {
  state.question = '';
  state.category = '';
  state.promptQuestion = '';
  state.currentCards = [];
  state.requestInFlight = false;
  document.body.classList.remove('result-mode');
  input.value = '';
  charCount.textContent = '0';
  chips.forEach((chip) => chip.classList.remove('selected'));
  submitBtn.disabled = true;
  cardsEl.innerHTML = '';
  cardsEl.classList.remove('show');
  resetBtn.classList.remove('show');
  inputSection.style.display = 'block';
  showStatus('', '');
  window.scrollTo({ top: 0, behavior: 'smooth' });
}
</script>
