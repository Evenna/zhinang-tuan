<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>智囊团 · 问问他们</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@300;400;600&family=Noto+Sans+SC:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #fafaf8;
      --ink: #1a1a1a;
      --muted: #b0b0a8;
      --line: #e8e8e4;
      --accent: #c4956a;
      --accent-light: #f0e8df;
      --card-bg: rgba(255,255,255,0.72);
      --font-serif: 'Noto Serif SC', 'STSong', 'SimSun', serif;
      --font-sans: 'Noto Sans SC', 'PingFang SC', sans-serif;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

    html { scroll-behavior: smooth; }

    body {
      background: var(--bg);
      color: var(--ink);
      font-family: var(--font-sans);
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* ── DECORATIVE CANVAS ── */
    .deco-canvas {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      pointer-events: none;
      z-index: 0;
      overflow: hidden;
    }
    .deco-canvas svg { width: 100%; height: 100%; }

    /* ── FLOATING ORBS ── */
    .orb {
      position: absolute;
      border-radius: 50%;
      filter: blur(80px);
      opacity: 0.18;
      animation: drift 20s ease-in-out infinite alternate;
    }
    .orb-1 { width: 400px; height: 400px; background: var(--accent); top: -100px; right: -100px; animation-duration: 25s; }
    .orb-2 { width: 300px; height: 300px; background: #e8d4c0; bottom: 10%; left: -80px; animation-duration: 18s; animation-delay: -5s; }
    @keyframes drift {
      0%   { transform: translate(0,0) scale(1); }
      100% { transform: translate(30px, 40px) scale(1.08); }
    }

    /* ── MAIN WRAP ── */
    .wrap {
      position: relative;
      z-index: 1;
      max-width: 680px;
      margin: 0 auto;
      padding: 0 28px;
    }

    /* ── HEADER ── */
    header {
      padding: 72px 0 56px;
      text-align: center;
    }
    .logo-wrap { position: relative; display: inline-block; }
    .logo {
      font-family: var(--font-serif);
      font-size: 2rem;
      font-weight: 300;
      letter-spacing: 0.25em;
      color: var(--ink);
      position: relative;
    }
    .logo em {
      font-style: normal;
      color: var(--accent);
      font-weight: 600;
    }
    .logo-punctuation {
      position: absolute;
      font-family: var(--font-serif);
      font-size: 5rem;
      color: var(--accent);
      opacity: 0.08;
      line-height: 1;
      top: -1.5rem;
      left: 50%;
      transform: translateX(-50%);
      pointer-events: none;
      user-select: none;
    }
    .tagline {
      font-size: 0.75rem;
      color: var(--muted);
      margin-top: 14px;
      letter-spacing: 0.3em;
      font-weight: 300;
    }

    /* ── DECORATIVE LINE ── */
    .deco-line {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      margin: 0 auto 48px;
      width: 120px;
    }
    .deco-line span {
      display: block;
      height: 1px;
      background: var(--line);
      flex: 1;
    }
    .deco-dot {
      width: 4px; height: 4px;
      border-radius: 50%;
      background: var(--accent);
      opacity: 0.6;
    }

    /* ── INPUT SECTION ── */
    .input-section { padding-bottom: 80px; }

    .input-label {
      font-family: var(--font-serif);
      font-size: 0.88rem;
      color: var(--muted);
      letter-spacing: 0.1em;
      display: block;
      margin-bottom: 20px;
    }
    .input-box {
      width: 100%;
      background: var(--card-bg);
      border: 1px solid var(--line);
      border-radius: 20px;
      padding: 22px 24px;
      font-size: 1rem;
      font-family: var(--font-sans);
      color: var(--ink);
      resize: none;
      outline: none;
      transition: border-color 0.3s, box-shadow 0.3s;
      min-height: 130px;
      line-height: 1.7;
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
    }
    .input-box:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 4px rgba(196,149,106,0.08);
    }
    .input-box::placeholder { color: #ccc; }
    .char-count {
      text-align: right;
      font-size: 0.72rem;
      color: #ccc;
      margin-top: 8px;
      font-weight: 300;
    }

    /* ── CATEGORY CHIPS ── */
    .chips {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-top: 24px;
    }
    .chip {
      padding: 9px 18px;
      border-radius: 24px;
      font-size: 0.78rem;
      background: var(--card-bg);
      border: 1px solid var(--line);
      color: var(--muted);
      cursor: pointer;
      transition: all 0.25s cubic-bezier(0.34,1.56,0.64,1);
      user-select: none;
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      letter-spacing: 0.03em;
    }
    .chip:hover {
      border-color: var(--accent);
      color: var(--accent);
      transform: scale(1.04);
    }
    .chip.selected {
      background: var(--ink);
      color: #fff;
      border-color: var(--ink);
      transform: scale(1.04);
    }
    .chip svg { margin-right: 5px; vertical-align: -2px; }

    /* ── SUBMIT ── */
    .submit-btn {
      width: 100%;
      background: var(--ink);
      color: #fff;
      border: none;
      padding: 20px;
      font-size: 0.92rem;
      font-weight: 400;
      font-family: var(--font-sans);
      border-radius: 16px;
      cursor: pointer;
      margin-top: 28px;
      letter-spacing: 0.2em;
      transition: all 0.3s cubic-bezier(0.34,1.56,0.64,1);
      position: relative;
      overflow: hidden;
    }
    .submit-btn::after {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg, rgba(255,255,255,0.08) 0%, transparent 60%);
      opacity: 0;
      transition: opacity 0.3s;
    }
    .submit-btn:hover { transform: scale(1.015); box-shadow: 0 8px 32px rgba(26,26,26,0.18); }
    .submit-btn:hover::after { opacity: 1; }
    .submit-btn:active { transform: scale(0.985); }
    .submit-btn:disabled { opacity: 0.28; cursor: not-allowed; transform: none; box-shadow: none; }

    /* ── DIVIDER ── */
    .divider-wrap {
      display: flex;
      align-items: center;
      gap: 20px;
      margin: 64px 0 48px;
    }
    .divider-line { flex: 1; height: 1px; background: var(--line); }
    .divider-text {
      font-size: 0.68rem;
      color: #ccc;
      letter-spacing: 0.25em;
      font-weight: 300;
    }

    /* ── CARDS ── */
    .cards { display: none; flex-direction: column; gap: 20px; padding-bottom: 100px; }
    .cards.show { display: flex; }

    .card {
      background: var(--card-bg);
      border: 1px solid rgba(232,232,228,0.8);
      border-radius: 24px;
      padding: 30px 28px 26px;
      opacity: 0;
      transform: translateY(28px);
      animation: cardReveal 0.6s cubic-bezier(0.22,1,0.36,1) forwards;
      backdrop-filter: blur(24px);
      -webkit-backdrop-filter: blur(24px);
      position: relative;
      overflow: hidden;
    }
    .card::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 1px;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.6), transparent);
    }
    @keyframes cardReveal {
      to { opacity: 1; transform: translateY(0); }
    }

    .card-header {
      display: flex;
      align-items: center;
      gap: 18px;
      margin-bottom: 18px;
    }

    /* ── AVATAR ── */
    .avatar-wrap {
      width: 56px; height: 56px;
      border-radius: 50%;
      background: var(--accent-light);
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      position: relative;
      overflow: hidden;
    }
    .avatar-wrap svg {
      width: 40px; height: 40px;
    }
    .avatar-ring {
      position: absolute;
      inset: -2px;
      border-radius: 50%;
      border: 1px solid rgba(196,149,106,0.25);
      animation: ringPulse 3s ease-in-out infinite;
    }
    @keyframes ringPulse {
      0%, 100% { transform: scale(1); opacity: 0.6; }
      50% { transform: scale(1.08); opacity: 0.2; }
    }

    .card-meta { flex: 1; }
    .card-name {
      font-family: var(--font-serif);
      font-size: 1.08rem;
      font-weight: 400;
      color: var(--ink);
      letter-spacing: 0.05em;
    }
    .card-title {
      font-size: 0.72rem;
      color: var(--muted);
      margin-top: 3px;
      letter-spacing: 0.02em;
      font-weight: 300;
    }

    .card-tags {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
      margin-bottom: 18px;
    }
    .tag {
      font-size: 0.68rem;
      padding: 3px 10px;
      border-radius: 10px;
      background: var(--accent-light);
      color: var(--accent);
      letter-spacing: 0.03em;
      opacity: 0.8;
    }

    .card-question {
      font-size: 0.82rem;
      color: var(--muted);
      margin-bottom: 16px;
      padding-left: 14px;
      border-left: 1.5px solid var(--line);
      line-height: 1.6;
    }
    .card-question em {
      color: var(--accent);
      font-style: normal;
      font-weight: 500;
    }

    .card-quote {
      font-family: var(--font-serif);
      font-size: 1rem;
      line-height: 2;
      color: #333;
      margin-bottom: 22px;
      position: relative;
      font-weight: 300;
    }
    .quote-mark-open {
      font-size: 2.5rem;
      color: var(--accent);
      opacity: 0.15;
      line-height: 0;
      vertical-align: -0.5em;
      margin-right: 2px;
      font-family: var(--font-serif);
    }
    .quote-mark-close {
      font-size: 2.5rem;
      color: var(--accent);
      opacity: 0.15;
      line-height: 0;
      vertical-align: -0.5em;
      margin-left: 2px;
      font-family: var(--font-serif);
    }

    .card-footer {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding-top: 16px;
      border-top: 1px solid var(--line);
    }
    .card-exp {
      font-size: 0.72rem;
      color: var(--muted);
      font-family: var(--font-serif);
      font-style: italic;
    }
    .card-action {
      font-size: 0.72rem;
      color: var(--muted);
      cursor: pointer;
      transition: color 0.2s;
      letter-spacing: 0.03em;
    }
    .card-action:hover { color: var(--accent); }

    /* ── LOADING ── */
    .loading {
      display: none;
      text-align: center;
      padding: 80px 0;
    }
    .loading.show { display: block; }
    .loading-orbs {
      display: flex;
      justify-content: center;
      gap: 10px;
      margin-bottom: 24px;
    }
    .loader-dot {
      width: 6px; height: 6px;
      border-radius: 50%;
      background: var(--accent);
      opacity: 0.3;
      animation: loaderBounce 1.2s ease-in-out infinite;
    }
    .loader-dot:nth-child(2) { animation-delay: 0.18s; }
    .loader-dot:nth-child(3) { animation-delay: 0.36s; }
    .loader-dot:nth-child(4) { animation-delay: 0.54s; }
    @keyframes loaderBounce {
      0%, 100% { transform: translateY(0) scale(1); opacity: 0.3; }
      50% { transform: translateY(-14px) scale(1.5); opacity: 1; }
    }
    .loading-text {
      font-size: 0.8rem;
      color: var(--muted);
      letter-spacing: 0.2em;
      font-weight: 300;
    }
    .loading-sub {
      font-size: 0.72rem;
      color: #ccc;
      margin-top: 6px;
      letter-spacing: 0.1em;
    }

    /* ── SHARE ── */
    .share-section {
      display: none;
      text-align: center;
      margin-top: 40px;
      padding: 32px;
      background: var(--card-bg);
      border: 1px solid rgba(232,232,228,0.6);
      border-radius: 24px;
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
    }
    .share-section.show { display: block; animation: cardReveal 0.5s ease forwards; }
    .share-title {
      font-family: var(--font-serif);
      font-size: 0.95rem;
      color: var(--ink);
      margin-bottom: 6px;
      font-weight: 400;
    }
    .share-sub { font-size: 0.75rem; color: var(--muted); margin-bottom: 20px; font-weight: 300; }
    .share-btn {
      background: transparent;
      border: 1px solid var(--line);
      color: var(--ink);
      padding: 12px 28px;
      font-size: 0.78rem;
      border-radius: 30px;
      cursor: pointer;
      transition: all 0.25s;
      font-family: var(--font-sans);
      letter-spacing: 0.1em;
    }
    .share-btn:hover {
      background: var(--ink);
      color: #fff;
      border-color: var(--ink);
    }

    /* ── RESET ── */
    .reset-btn {
      display: none;
      width: 100%;
      background: transparent;
      border: 1px solid var(--line);
      color: var(--muted);
      padding: 15px;
      font-size: 0.8rem;
      border-radius: 14px;
      cursor: pointer;
      margin-top: 16px;
      transition: all 0.25s;
      font-family: var(--font-sans);
      letter-spacing: 0.1em;
    }
    .reset-btn.show { display: block; }
    .reset-btn:hover { border-color: var(--muted); color: var(--ink); }

    /* ── FOOTER ── */
    .footer {
      text-align: center;
      padding: 56px 0 48px;
      font-size: 0.68rem;
      color: #ccc;
      letter-spacing: 0.12em;
      font-weight: 300;
    }

    /* ── DECORATIVE CARDS CORNER ── */
    .card-deco-corner {
      position: absolute;
      width: 60px; height: 60px;
      opacity: 0.04;
      pointer-events: none;
    }
    .card-deco-corner.top-right { top: 12px; right: 12px; }
    .card-deco-corner.bottom-left { bottom: 12px; left: 12px; transform: rotate(180deg); }
  </style>
</head>
<body>

<!-- DECORATIVE LAYER -->
<div class="deco-canvas" aria-hidden="true">
  <!-- Floating orbs -->
  <div class="orb orb-1"></div>
  <div class="orb orb-2"></div>

  <!-- SVG decorative elements -->
  <svg viewBox="0 0 1440 900" preserveAspectRatio="xMidYMid slice" xmlns="http://www.w3.org/2000/svg">
    <defs>
      <pattern id="dots" x="0" y="0" width="28" height="28" patternUnits="userSpaceOnUse">
        <circle cx="1" cy="1" r="0.8" fill="#c4956a" opacity="0.12"/>
      </pattern>
      <pattern id="grid" x="0" y="0" width="80" height="80" patternUnits="userSpaceOnUse">
        <path d="M 80 0 L 0 0 0 80" fill="none" stroke="#c4956a" stroke-width="0.3" opacity="0.06"/>
      </pattern>
    </defs>

    <!-- Background patterns -->
    <rect width="100%" height="100%" fill="url(#dots)"/>
    <rect width="100%" height="100%" fill="url(#grid)"/>

    <!-- Top-right corner arc -->
    <path d="M 1200,0 Q 1440,0 1440,240" fill="none" stroke="#c4956a" stroke-width="0.8" opacity="0.08"/>
    <path d="M 1180,0 Q 1440,0 1440,260" fill="none" stroke="#c4956a" stroke-width="0.4" opacity="0.05"/>

    <!-- Bottom-left corner arc -->
    <path d="M 0,660 Q 0,900 240,900" fill="none" stroke="#c4956a" stroke-width="0.8" opacity="0.08"/>
    <path d="M 0,640 Q 0,900 260,900" fill="none" stroke="#c4956a" stroke-width="0.4" opacity="0.05"/>

    <!-- Floating horizontal lines -->
    <line x1="80" y1="200" x2="280" y2="200" stroke="#c4956a" stroke-width="0.5" opacity="0.06"/>
    <line x1="60" y1="204" x2="180" y2="204" stroke="#c4956a" stroke-width="0.5" opacity="0.04"/>
    <line x1="1100" y1="680" x2="1360" y2="680" stroke="#c4956a" stroke-width="0.5" opacity="0.06"/>
    <line x1="1200" y1="684" x2="1380" y2="684" stroke="#c4956a" stroke-width="0.5" opacity="0.04"/>

    <!-- Scattered small circles -->
    <circle cx="320" cy="140" r="2" fill="#c4956a" opacity="0.07"/>
    <circle cx="324" cy="144" r="1" fill="#c4956a" opacity="0.05"/>
    <circle cx="1100" cy="820" r="2" fill="#c4956a" opacity="0.07"/>
    <circle cx="1104" cy="824" r="1" fill="#c4956a" opacity="0.05"/>
    <circle cx="1350" cy="300" r="1.5" fill="#c4956a" opacity="0.06"/>
    <circle cx="200" cy="780" r="1.5" fill="#c4956a" opacity="0.06"/>

    <!-- Diagonal accent lines -->
    <line x1="1300" y1="100" x2="1400" y2="200" stroke="#c4956a" stroke-width="0.4" opacity="0.05"/>
    <line x1="1310" y1="90" x2="1350" y2="130" stroke="#c4956a" stroke-width="0.4" opacity="0.04"/>
    <line x1="50" y1="600" x2="150" y2="700" stroke="#c4956a" stroke-width="0.4" opacity="0.05"/>
  </svg>
</div>

<div class="wrap">

  <!-- HEADER -->
  <header>
    <div class="logo-wrap">
      <span class="logo-punctuation" aria-hidden="true">"</span>
      <div class="logo">智<em>囊</em>团</div>
    </div>
    <div class="tagline">问问他们 · 你会得到不一样的答案</div>

    <!-- Decorative line -->
    <div class="deco-line" aria-hidden="true">
      <span></span>
      <div class="deco-dot"></div>
      <span></span>
    </div>
  </header>

  <!-- INPUT -->
  <section class="input-section" id="inputSection">
    <label class="input-label">你正在纠结什么？</label>
    <textarea
      class="input-box"
      id="questionInput"
      placeholder="比如：该不该离开北京回老家？"
      maxlength="200"
    ></textarea>
    <div class="char-count"><span id="charCount">0</span> / 200</div>

    <div class="chips" id="chips">
      <div class="chip" data-cat="职场">
        <svg width="12" height="12" viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="1.2">
          <rect x="1.5" y="4" width="9" height="7" rx="1"/>
          <path d="M4 4V3a2 2 0 0 1 4 0v1"/>
        </svg>
        职场发展
      </div>
      <div class="chip" data-cat="财务">
        <svg width="12" height="12" viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="1.2">
          <circle cx="6" cy="6" r="4.5"/>
          <path d="M6 4.5v3M5 7.5h2"/>
        </svg>
        财务决策
      </div>
      <div class="chip" data-cat="情感">
        <svg width="12" height="12" viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="1.2">
          <path d="M6 10.5C6 10.5 2 8 2 5a3 3 0 0 1 5-2.24A3 3 0 0 1 10 5c0 3-4 5-4 5.5z"/>
        </svg>
        情感关系
      </div>
      <div class="chip" data-cat="方向">
        <svg width="12" height="12" viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="1.2">
          <circle cx="6" cy="6" r="4.5"/>
          <path d="M6 2v4l2.5 2.5"/>
        </svg>
        人生方向
      </div>
    </div>

    <button class="submit-btn" id="submitBtn" disabled>穿越时空 · 寻找答案</button>
  </section>

  <!-- LOADING -->
  <div class="loading" id="loading">
    <div class="loading-orbs">
      <div class="loader-dot"></div>
      <div class="loader-dot"></div>
      <div class="loader-dot"></div>
      <div class="loader-dot"></div>
    </div>
    <div class="loading-text">智囊团正在赶来的路上</div>
    <div class="loading-sub">正在连接历史...</div>
  </div>

  <!-- CARDS -->
  <div class="cards" id="cards"></div>

  <!-- SHARE -->
  <div class="share-section" id="shareSection">
    <div class="share-title">📢 分享你的困惑</div>
    <div class="share-sub">看看先哲们会怎么说</div>
    <button class="share-btn" onclick="captureShare()">生成分享图</button>
  </div>

  <!-- RESET -->
  <button class="reset-btn" id="resetBtn" onclick="resetAll()">重新提问 ↺</button>

  <div class="divider-wrap">
    <div class="divider-line"></div>
    <div class="divider-text">or</div>
    <div class="divider-line"></div>
  </div>

  <!-- FOOTER -->
  <div class="footer">
    智囊团 · 纯属娱乐 · 切勿当真
  </div>
</div>

<script>
// ─── LINE AVATAR SVGs ───
// Each person has a unique minimalist line-art face silhouette
const AVATARS = {
  苏格拉底: `<svg viewBox="0 0 40 40" fill="none" xmlns="http://www.w3.org/2000/svg">
    <circle cx="20" cy="16" r="9" stroke="#c4956a" stroke-width="1.2"/>
    <path d="M12 24 Q20 32 28 24" stroke="#c4956a" stroke-width="1.2" fill="none"/>
    <path d="M11 14 Q14 11 17 14" stroke="#c4956a" stroke-width="0.9" fill="none"/>
    <path d="M23 14 Q26 11 29 14" stroke="#c4956a" stroke-width="0.9" fill="none"/>

// ─── STATE ───
let question = '';
let category = '';

// ─── DOM ───
const input = document.getElementById('questionInput');
const charCount = document.getElementById('charCount');
const chips = document.querySelectorAll('.chip');
const submitBtn = document.getElementById('submitBtn');
const inputSection = document.getElementById('inputSection');
const loading = document.getElementById('loading');
const cardsEl = document.getElementById('cards');
const shareSection = document.getElementById('shareSection');
const resetBtn = document.getElementById('resetBtn');

// ─── INPUT ───
input.addEventListener('input', function() {
  question = this.value;
  charCount.textContent = question.length;
  submitBtn.disabled = question.trim().length < 5;
});

chips.forEach(chip => {
  chip.addEventListener('click', () => {
    chips.forEach(c => c.classList.remove('selected'));
    chip.classList.add('selected');
    category = chip.dataset.cat;
  });
});

submitBtn.addEventListener('click', generateCards);

function generateCards() {
  if (question.trim().length < 5) return;

  inputSection.style.display = 'none';
  loading.classList.add('show');

  // Select 3-4 celebrities
  const keys = Object.keys(CELEBRITIES);
  const shuffled = keys.sort(() => Math.random() - 0.5);
  const selected = shuffled.slice(0, 4);

  setTimeout(() => {
    loading.classList.remove('show');
    renderCards(selected);
    cardsEl.classList.add('show');
    shareSection.classList.add('show');
    resetBtn.classList.add('show');

    // Scroll to first card
    setTimeout(() => {
      cardsEl.scrollIntoView({ behavior: 'smooth', block: 'start' });
    }, 100);
  }, 2000);
}

function renderCards(names) {
  cardsEl.innerHTML = names.map((name, i) => {
    const p = CELEBRITIES[name];
    const advice = p.advice[category] || p.advice.default;
    const delay = i * 0.12;

    return `
      <div class="card" style="animation-delay: ${delay}s">
        <!-- Corner decoration -->
        <svg class="card-deco-corner top-right" viewBox="0 0 60 60" fill="none">
          <path d="M0 0 L60 0 L60 10 Q30 10 10 60 L0 60 Z" fill="#c4956a"/>
        </svg>
        <svg class="card-deco-corner bottom-left" viewBox="0 0 60 60" fill="none">
          <path d="M0 0 L60 0 L60 10 Q30 10 10 60 L0 60 Z" fill="#c4956a"/>
        </svg>

        <div class="card-header">
          <div class="avatar-wrap">
            ${p.avatar}
            <div class="avatar-ring"></div>
          </div>
          <div class="card-meta">
            <div class="card-name">${name}</div>
            <div class="card-title">${p.title}</div>
          </div>
        </div>

        <div class="card-tags">
          ${p.tags.map(t => `<span class="tag">${t}</span>`).join('')}
        </div>

        <div class="card-question">
          你问：<em>${question}</em>
        </div>

        <div class="card-quote">
          <span class="quote-mark-open">"</span>${advice}<span class="quote-mark-close">"</span>
        </div>

        <div class="card-footer">
          <div class="card-exp">${p.exp}</div>
          <div class="card-action">💬 追问</div>
        </div>
      </div>
    `;
  }).join('');
}

function resetAll() {
  question = '';
  category = '';
  input.value = '';
  charCount.textContent = '0';
  chips.forEach(c => c.classList.remove('selected'));
  submitBtn.disabled = true;
  cardsEl.innerHTML = '';
  cardsEl.classList.remove('show');
  shareSection.classList.remove('show');
  resetBtn.classList.remove('show');
  inputSection.style.display = 'block';
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function captureShare() {
  alert('截图分享更美观哦～ 快捷键：Mac 按 ⌘⇧4 / Windows 按 Win+Shift+S');
}
