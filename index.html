<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>智囊团 · 问问他们</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    html, body { height: 100%; }
    body {
      background: #fafaf8;
      color: #1a1a1a;
      font-family: -apple-system, BlinkMacSystemFont, 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif;
      min-height: 100vh;
      line-height: 1.6;
    }

    .wrap { max-width: 640px; margin: 0 auto; padding: 0 24px; }

    /* ── HEADER ── */
    header {
      padding: 48px 0 32px;
      text-align: center;
    }
    .logo {
      font-family: 'PingFang SC', 'Hiragino Sans GB', 'STSong', 'SimSun', serif;
      font-size: 1.8rem;
      font-weight: 700;
      letter-spacing: 0.08em;
      color: #1a1a1a;
    }
    .logo span { color: #c4956a; }
    .tagline {
      font-size: 0.82rem;
      color: #999;
      margin-top: 8px;
      letter-spacing: 0.12em;
    }

    /* ── INPUT SECTION ── */
    .input-section {
      padding: 40px 0 60px;
    }
    .input-label {
      font-family: 'PingFang SC', 'Hiragino Sans GB', 'STSong', 'SimSun', serif;
      font-size: 1.1rem;
      color: #444;
      margin-bottom: 16px;
      display: block;
    }
    .input-box {
      width: 100%;
      background: #fff;
      border: 1.5px solid #e8e8e6;
      border-radius: 16px;
      padding: 20px;
      font-size: 1rem;
      font-family: inherit;
      color: #1a1a1a;
      resize: none;
      outline: none;
      transition: border-color 0.2s;
      min-height: 120px;
    }
    .input-box:focus { border-color: #c4956a; }
    .input-box::placeholder { color: #ccc; }
    .char-count {
      text-align: right;
      font-size: 0.75rem;
      color: #ccc;
      margin-top: 8px;
    }
    .submit-btn {
      width: 100%;
      background: #1a1a1a;
      color: #fff;
      border: none;
      padding: 18px;
      font-size: 1rem;
      font-weight: 500;
      border-radius: 14px;
      cursor: pointer;
      margin-top: 20px;
      letter-spacing: 0.1em;
      transition: opacity 0.2s, transform 0.1s;
    }
    .submit-btn:hover { opacity: 0.85; }
    .submit-btn:active { transform: scale(0.99); }
    .submit-btn:disabled { opacity: 0.3; cursor: not-allowed; }

    /* ── CATEGORY CHIPS ── */
    .chips {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 20px;
    }
    .chip {
      padding: 8px 16px;
      border-radius: 20px;
      font-size: 0.8rem;
      background: #fff;
      border: 1px solid #e0e0de;
      color: #888;
      cursor: pointer;
      transition: all 0.2s;
      user-select: none;
    }
    .chip:hover { border-color: #c4956a; color: #c4956a; }
    .chip.selected { background: #1a1a1a; color: #fff; border-color: #1a1a1a; }

    /* ── DIVIDER ── */
    .divider {
      display: flex;
      align-items: center;
      gap: 16px;
      margin: 48px 0;
      color: #ccc;
      font-size: 0.75rem;
      letter-spacing: 0.1em;
    }
    .divider::before, .divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: #e8e8e6;
    }

    /* ── CARDS ── */
    .cards { display: none; flex-direction: column; gap: 24px; padding-bottom: 80px; }
    .cards.show { display: flex; }

    .card {
      background: #fff;
      border: 1px solid #ebebea;
      border-radius: 20px;
      padding: 28px;
      opacity: 0;
      transform: translateY(20px);
      animation: fadeUp 0.5s ease forwards;
    }
    @keyframes fadeUp {
      to { opacity: 1; transform: translateY(0); }
    }

    .card-header {
      display: flex;
      align-items: center;
      gap: 16px;
      margin-bottom: 20px;
    }
    .avatar {
      width: 52px;
      height: 52px;
      border-radius: 50%;
      background: #f5f0eb;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.5rem;
      flex-shrink: 0;
    }
    .card-meta { flex: 1; }
    .card-name {
      font-family: 'PingFang SC', 'Hiragino Sans GB', 'STSong', 'SimSun', serif;
      font-size: 1.1rem;
      font-weight: 600;
      color: #1a1a1a;
    }
    .card-title {
      font-size: 0.78rem;
      color: #999;
      margin-top: 2px;
    }
    .card-tags {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
    }
    .tag {
      font-size: 0.7rem;
      padding: 3px 10px;
      border-radius: 12px;
      background: #f5f0eb;
      color: #a89080;
    }

    .card-question {
      font-size: 0.85rem;
      color: #888;
      margin-bottom: 16px;
      padding-left: 12px;
      border-left: 2px solid #e8e4e0;
    }
    .card-question em { color: #c4956a; font-style: normal; }

    .card-quote {
      font-family: 'PingFang SC', 'Hiragino Sans GB', 'STSong', 'SimSun', serif;
      font-size: 1.05rem;
      line-height: 1.9;
      color: #333;
      margin-bottom: 20px;
    }
    .card-quote::before { content: '"'; color: #d4c4b4; font-size: 2rem; line-height: 0; vertical-align: -0.4em; margin-right: 4px; }
    .card-quote::after { content: '"'; color: #d4c4b4; font-size: 2rem; line-height: 0; vertical-align: -0.4em; margin-left: 2px; }

    .card-footer {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding-top: 16px;
      border-top: 1px solid #f0f0ee;
    }
    .card-exp {
      font-size: 0.75rem;
      color: #bbb;
    }
    .card-exp strong { color: #c4956a; }
    .card-action {
      font-size: 0.75rem;
      color: #ccc;
      cursor: pointer;
      transition: color 0.2s;
    }
    .card-action:hover { color: #c4956a; }

    /* ── FOOTER ── */
    .footer {
      text-align: center;
      padding: 40px 0;
      font-size: 0.72rem;
      color: #ccc;
      letter-spacing: 0.05em;
    }

    /* ── LOADING ── */
    .loading {
      display: none;
      text-align: center;
      padding: 60px 0;
    }
    .loading.show { display: block; }
    .loading-dots {
      display: flex;
      justify-content: center;
      gap: 8px;
    }
    .dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      background: #ddd;
      animation: pulse 1.4s ease-in-out infinite;
    }
    .dot:nth-child(2) { animation-delay: 0.2s; }
    .dot:nth-child(3) { animation-delay: 0.4s; }
    @keyframes pulse {
      0%, 100% { background: #ddd; transform: scale(1); }
      50% { background: #c4956a; transform: scale(1.3); }
    }
    .loading-text {
      margin-top: 16px;
      font-size: 0.82rem;
      color: #bbb;
    }

    /* ── SHARE ── */
    .share-section {
      display: none;
      background: #fff;
      border: 1px solid #ebebea;
      border-radius: 20px;
      padding: 24px;
      margin-top: 32px;
      text-align: center;
    }
    .share-section.show { display: block; }
    .share-title {
      font-family: 'PingFang SC', 'Hiragino Sans GB', 'STSong', 'SimSun', serif;
      font-size: 1rem;
      color: #333;
      margin-bottom: 8px;
    }
    .share-sub { font-size: 0.78rem; color: #ccc; margin-bottom: 16px; }
    .share-btn {
      background: #f5f0eb;
      color: #1a1a1a;
      border: none;
      padding: 14px 32px;
      font-size: 0.85rem;
      border-radius: 30px;
      cursor: pointer;
      transition: background 0.2s;
    }
    .share-btn:hover { background: #ebe5de; }

    /* ── RESET ── */
    .reset-btn {
      display: none;
      width: 100%;
      background: transparent;
      border: 1px solid #e0e0de;
      color: #999;
      padding: 14px;
      font-size: 0.85rem;
      border-radius: 14px;
      cursor: pointer;
      margin-top: 16px;
      transition: all 0.2s;
    }
    .reset-btn.show { display: block; }
    .reset-btn:hover { border-color: #ccc; color: #666; }
  </style>
</head>

  </div>

</div>

      财务: '大多数人投资亏钱，是因为他们把运气当能力，把牛市当智慧。财务决策的第一原则是：永远不要亏损。第二原则是：记住第一条。',
      情感: '我见过很多人婚姻失败，不是因为不爱，是因为双方都太自我。好的关系需要的是让步和智慧，不是正确和强势。娶一个好老婆，嫁一个好老公，是人生最重要的投资。',
      方向: '我的方法是：找到一个你敬佩的人，研究他是怎么思考问题的，然后模仿。如果你在人生的某个阶段遇到了瓶颈，最好的办法不是继续撞墙，而是去看看别人是怎么翻过去的。'
    }
  }
};

// ─── STATE ───
let question = '';
let category = '';

// ─── DOM ───
const input = document.getElementById('questionInput');
const charCount = document.getElementById('charCount');
const chips = document.querySelectorAll('.chip');
const submitBtn = document.getElementById('submitBtn');
const inputSection = document.getElementById('inputSection');
const loading = document.getElementById('loading');
const cardsEl = document.getElementById('cards');
const shareSection = document.getElementById('shareSection');
const resetBtn = document.getElementById('resetBtn');

// ─── INPUT ───
input.addEventListener('input', function() {
  question = this.value;
  charCount.textContent = question.length;
  submitBtn.disabled = question.trim().length < 5;
});

chips.forEach(chip => {
  chip.addEventListener('click', () => {
    chips.forEach(c => c.classList.remove('selected'));
    chip.classList.add('selected');
    category = chip.dataset.cat;
  });
});

submitBtn.addEventListener('click', generateCards);

function generateCards() {
  if (question.trim().length < 5) return;

  inputSection.style.display = 'none';
  loading.classList.add('show');

  // Select 3-4 celebrities based on category or random
  const keys = Object.keys(CELEBRITIES);
  const shuffled = keys.sort(() => Math.random() - 0.5);
  const selected = shuffled.slice(0, 4);

  setTimeout(() => {
    loading.classList.remove('show');
    renderCards(selected);
    cardsEl.classList.add('show');
    shareSection.classList.add('show');
    resetBtn.classList.add('show');
  }, 1800);
}

function renderCards(names) {
  cardsEl.innerHTML = names.map((name, i) => {
    const p = CELEBRITIES[name];
    const advice = p.advice[category] || p.advice.default;
    const delay = i * 0.15;

    return `
      <div class="card" style="animation-delay: ${delay}s">
        <div class="card-header">
          <div class="avatar">${p.emoji}</div>
          <div class="card-meta">
            <div class="card-name">${name}</div>
            <div class="card-title">${p.title}</div>
          </div>
        </div>
        <div class="card-tags">
          ${p.tags.map(t => `<span class="tag">${t}</span>`).join('')}
        </div>
        <div class="card-question">你问：<em>${question}</em></div>
        <div class="card-quote">${advice}</div>
        <div class="card-footer">
          <div class="card-exp">${p.exp}</div>
          <div class="card-action">💬 追问</div>
        </div>
      </div>
    `;
  }).join('');
}

function resetAll() {
  question = '';
  category = '';
  input.value = '';
  charCount.textContent = '0';
  chips.forEach(c => c.classList.remove('selected'));
  submitBtn.disabled = true;
  cardsEl.innerHTML = '';
  cardsEl.classList.remove('show');
  shareSection.classList.remove('show');
  resetBtn.classList.remove('show');
  inputSection.style.display = 'block';
}
</script>
</body>
</html>
