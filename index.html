<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>智囊团 · 问问他们</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Alegreya:wght@400;500;600&family=Bodoni+Moda:opsz,wght@6..96,400;6..96,500;6..96,600&family=Cormorant+Garamond:wght@400;500;600&family=Cormorant+Infant:wght@400;500;600&family=DM+Serif+Display:ital@0;1&family=EB+Garamond:wght@400;500;600&family=Libre+Bodoni:wght@400;500;600&family=Lora:wght@400;500;600&family=Noto+Sans+SC:wght@300;400;500&family=Noto+Serif+SC:wght@300;400;600&family=Old+Standard+TT:ital,wght@0,400;0,700;1,400&family=Playfair+Display:wght@400;500;600&family=Prata&family=Sorts+Mill+Goudy:ital@0;1&family=Spectral:wght@400;500;600&family=Vidaloka&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #060606;
      --ink: #f6f0e7;
      --muted: #8e8477;
      --line: rgba(212, 175, 123, 0.18);
      --accent: #d4af7b;
      --accent-light: rgba(212, 175, 123, 0.12);
      --card-bg: rgba(255,255,255,0.06);
      --font-serif: 'Noto Serif SC', 'STSong', 'SimSun', serif;
      --font-sans: 'Noto Sans SC', 'PingFang SC', sans-serif;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

    html { scroll-behavior: smooth; }

    body {
      background:
        radial-gradient(circle at 50% 20%, rgba(212,175,123,0.08), transparent 26%),
        linear-gradient(180deg, #090909, #040404 58%);
      color: var(--ink);
      font-family: var(--font-sans);
      min-height: 100vh;
      overflow-x: hidden;
    }
    body.result-mode {
      overflow: hidden;
      background:
        radial-gradient(circle at 50% 18%, rgba(193,152,99,0.12), transparent 24%),
        radial-gradient(circle at 16% 40%, rgba(255,255,255,0.035), transparent 18%),
        radial-gradient(circle at 84% 34%, rgba(255,255,255,0.03), transparent 16%),
        linear-gradient(180deg, #060606 0%, #020202 100%);
    }
    body.result-mode .wrap {
      max-width: none;
      width: 100%;
      padding: 0;
    }
    body.result-mode .home-hero,
    body.result-mode .divider-wrap,
    body.result-mode .footer {
      display: none;
    }

    /* ── MAIN WRAP ── */
    .wrap {
      position: relative;
      z-index: 1;
      max-width: none;
      margin: 0 auto;
      padding: 0;
    }

    /* ── HOME HERO ── */
    .home-hero {
      position: relative;
      min-height: 100vh;
      padding: 28px clamp(20px, 3vw, 42px) 34px;
      overflow: hidden;
      isolation: isolate;
      background:
        radial-gradient(circle at 50% 44%, rgba(255,255,255,0.05), transparent 18%),
        radial-gradient(circle at 50% 62%, rgba(193,152,99,0.08), transparent 26%),
        linear-gradient(180deg, #060606 0%, #020202 100%);
    }
    .home-hero::before {
      content: '';
      position: absolute;
      inset: 0;
      background:
        linear-gradient(90deg, rgba(255,255,255,0.035) 1px, transparent 1px),
        linear-gradient(180deg, rgba(255,255,255,0.028) 1px, transparent 1px);
      background-size: 64px 64px;
      opacity: 0.18;
      pointer-events: none;
      z-index: 0;
      mask-image: radial-gradient(circle at 50% 46%, rgba(0,0,0,0.88), transparent 88%);
      -webkit-mask-image: radial-gradient(circle at 50% 46%, rgba(0,0,0,0.88), transparent 88%);
    }
    .home-hero::after {
      content: '';
      position: absolute;
      inset: 0;
      background:
        radial-gradient(circle at 28% 42%, rgba(193,152,99,0.08), transparent 16%),
        radial-gradient(circle at 72% 40%, rgba(193,152,99,0.08), transparent 16%);
      pointer-events: none;
      z-index: 0;
    }
    header {
      position: relative;
      z-index: 2;
      padding: 0;
      text-align: left;
    }
    .topbar {
      display: grid;
      grid-template-columns: 1fr auto 1fr;
      align-items: center;
      gap: 20px;
      min-height: 72px;
    }
    .brand {
      display: inline-flex;
      align-items: center;
      gap: 14px;
      color: var(--ink);
      text-decoration: none;
      justify-self: start;
    }
    .brand-mark {
      width: 38px;
      height: 38px;
      border-radius: 50%;
      border: 1px solid rgba(255,255,255,0.16);
      display: inline-flex;
      align-items: center;
      justify-content: center;
      background: rgba(255,255,255,0.02);
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.04);
      font-size: 0.9rem;
    }
    .brand-copy {
      display: flex;
      flex-direction: column;
      gap: 4px;
    }
    .logo {
      font-family: var(--font-serif);
      font-size: 1.08rem;
      font-weight: 500;
      letter-spacing: 0.08em;
      color: var(--ink);
      line-height: 1;
    }
    .tagline {
      font-size: 0.5rem;
      color: rgba(246,240,231,0.56);
      letter-spacing: 0.22em;
      font-weight: 400;
      text-transform: uppercase;
      margin-top: 0;
    }
    .nav-links {
      display: flex;
      align-items: center;
      gap: clamp(20px, 3vw, 42px);
      justify-self: center;
    }
    .nav-links a {
      color: rgba(246,240,231,0.68);
      text-decoration: none;
      font-size: 0.74rem;
      letter-spacing: 0.08em;
      transition: color 0.25s ease;
    }
    .nav-links a:hover,
    .nav-links a.is-active {
      color: var(--accent);
    }
    .nav-actions {
      display: flex;
      align-items: center;
      gap: 12px;
      justify-self: end;
    }
    .nav-btn {
      padding: 10px 16px;
      border-radius: 999px;
      border: 1px solid rgba(255,255,255,0.12);
      color: rgba(246,240,231,0.82);
      font-size: 0.72rem;
      background: rgba(255,255,255,0.03);
      text-decoration: none;
      transition: all 0.25s ease;
    }
    .nav-btn:hover {
      transform: translateY(-1px);
      border-color: rgba(212,175,123,0.26);
    }
    .hero-center {
      position: relative;
      z-index: 2;
      min-height: calc(100vh - 100px);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px 0 84px;
    }
    .hero-panel {
      width: min(720px, calc(100vw - 44px));
      text-align: center;
    }
    .hero-kicker {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      padding: 7px 13px;
      border-radius: 999px;
      border: 1px solid rgba(255,255,255,0.1);
      background: rgba(255,255,255,0.03);
      color: rgba(246,240,231,0.64);
      font-size: 0.62rem;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
    }
    .hero-kicker::before {
      content: '';
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: rgba(255,255,255,0.86);
      box-shadow: 0 0 0 6px rgba(255,255,255,0.08);
    }
    .hero-title {
      margin-top: 10px;
      font-family: var(--font-serif);
      font-size: clamp(2.7rem, 5.2vw, 4.2rem);
      line-height: 1.22;
      letter-spacing: 0.1em;
      color: #f5eee6;
      text-shadow: 0 12px 34px rgba(0,0,0,0.42);
    }
    .hero-title em {
      color: #f5eee6;
      font-style: normal;
      font-weight: 400;
    }
    .hero-subtitle {
      width: min(560px, 88%);
      margin: 14px auto 0;
      color: rgba(246,240,231,0.54);
      font-size: 0.96rem;
      line-height: 1.9;
      letter-spacing: 0.06em;
    }

    /* ── INPUT SECTION ── */
    .input-section {
      position: relative;
      z-index: 2;
      width: min(700px, 100%);
      margin: 28px auto 0;
      padding-bottom: 0;
    }
    .input-label { display: none; }
    .input-panel {
      position: relative;
      padding: 0;
      border: 0;
      background: transparent;
      box-shadow: none;
      backdrop-filter: none;
      -webkit-backdrop-filter: none;
      overflow: visible;
    }
    .input-box {
      position: relative;
      z-index: 1;
      width: 100%;
      background:
        linear-gradient(180deg, rgba(255,255,255,0.08), rgba(255,255,255,0.028) 34%, rgba(255,255,255,0.012)),
        rgba(0,0,0,0.28);
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 24px;
      padding: 23px 108px 23px 26px;
      font-size: 0.98rem;
      font-family: var(--font-sans);
      color: #f8f3ed;
      resize: none;
      outline: none;
      transition: border-color 0.3s, box-shadow 0.3s, background 0.3s;
      min-height: 76px;
      line-height: 1.6;
      box-shadow:
        0 16px 34px rgba(0,0,0,0.18),
        inset 0 1px 0 rgba(255,255,255,0.1);
      backdrop-filter: blur(10px) saturate(122%);
      -webkit-backdrop-filter: blur(10px) saturate(122%);
    }
    .input-box:focus {
      border-color: rgba(255,255,255,0.18);
      box-shadow:
        0 0 0 3px rgba(255,255,255,0.022),
        0 18px 36px rgba(0,0,0,0.18),
        inset 0 1px 0 rgba(255,255,255,0.13);
      background:
        linear-gradient(180deg, rgba(255,255,255,0.09), rgba(255,255,255,0.03) 34%, rgba(255,255,255,0.014)),
        rgba(0,0,0,0.24);
    }
    .input-box::placeholder { color: rgba(246,240,231,0.3); }
    .char-count { display: none; }

    /* ── CATEGORY CHIPS ── */
    .chips {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 18px;
      margin-top: 18px;
    }
    .chip {
      padding: 0;
      border-radius: 0;
      font-size: 0.66rem;
      background: transparent;
      border: none;
      color: rgba(246,240,231,0.52);
      cursor: default;
      transition: all 0.25s ease;
      user-select: none;
      letter-spacing: 0.08em;
    }
    .chip:hover {
      color: rgba(246,240,231,0.82);
      transform: translateY(-1px);
    }
    .chip.selected {
      background: transparent;
      color: #fff3e2;
      transform: translateY(-1px);
    }
    .chip svg { display: none; }

    /* ── SUBMIT ── */
    .submit-btn {
      position: absolute;
      right: 14px;
      top: 50%;
      z-index: 3;
      transform: translateY(-50%);
      min-width: 62px;
      width: 62px;
      height: 62px;
      padding: 0;
      border-radius: 999px;
      background: linear-gradient(135deg, rgba(245,242,236,0.96), rgba(223,217,206,0.96));
      color: #111;
      border: none;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 0;
      font-size: 0;
      font-family: var(--font-sans);
      cursor: pointer;
      margin-top: 0;
      transition: transform 0.25s ease, box-shadow 0.25s ease, opacity 0.25s ease;
      overflow: hidden;
      box-shadow: 0 18px 36px rgba(0,0,0,0.34);
    }
    .submit-btn::after {
      content: '→';
      font-size: 1.5rem;
      font-weight: 700;
    }
    .submit-btn:hover {
      transform: translateY(-50%) scale(1.04);
      box-shadow: 0 22px 42px rgba(0,0,0,0.38);
    }
    .submit-btn:active { transform: translateY(-50%) scale(0.98); }
    .submit-btn:disabled {
      opacity: 0.62;
      cursor: not-allowed;
      transform: translateY(-50%);
      box-shadow: 0 10px 20px rgba(0,0,0,0.2);
    }

    .hero-notes {
      margin-top: 18px;
      display: flex;
      justify-content: center;
      gap: 16px;
      flex-wrap: wrap;
      color: rgba(246,240,231,0.42);
      font-size: 0.64rem;
      letter-spacing: 0.08em;
    }
    .hero-note {
      padding: 0;
      border-radius: 0;
      background: transparent;
      border: none;
    }
    .api-status {
      min-height: 20px;
      margin-top: 14px;
      font-size: 0.76rem;
      letter-spacing: 0.04em;
      color: rgba(246,240,231,0.48);
      transition: color 0.25s ease, opacity 0.25s ease;
    }
    .api-status.error {
      color: #f3a8a0;
    }
    .api-status.success {
      color: #d4af7b;
    }

    /* ── DIVIDER ── */
    .divider-wrap { display: none; }

    .home-figures {
      position: absolute;
      inset: 88px 0 0;
      pointer-events: none;
      z-index: 1;
    }
    .home-word {
      position: absolute;
      font-family: var(--font-serif);
      font-size: clamp(2.6rem, 5vw, 4.4rem);
      letter-spacing: 0.24em;
      color: rgba(193,152,99,0.08);
      text-transform: uppercase;
      white-space: nowrap;
    }
    .home-word.left {
      left: 3.5%;
      top: 38%;
    }
    .home-word.right {
      right: 3.5%;
      top: 58%;
    }
    .home-figure {
      position: absolute;
      width: clamp(160px, 16vw, 250px);
      opacity: 0.9;
      pointer-events: auto;
      --figure-base-transform: translateX(0px);
      --home-x: 0px;
      --home-y: 0px;
      --home-scale: 1;
      --home-flip: 1;
      transform:
        var(--figure-base-transform)
        translate(var(--home-x), var(--home-y))
        scale(calc(var(--home-scale) * var(--home-flip)), var(--home-scale));
      transform-origin: center bottom;
      transition: transform 0.28s ease, opacity 0.22s ease;
      cursor: pointer;
    }
    .home-figure.is-editing {
      opacity: 1;
    }
    .home-figure.is-editing::before {
      border-color: rgba(196,149,106,0.72);
      box-shadow: inset 0 0 0 1px rgba(196,149,106,0.28);
    }
    .home-figure::before {
      content: '';
      position: absolute;
      inset: 10% auto auto 8%;
      width: 74%;
      height: 78%;
      border: 1px solid rgba(255,255,255,0.08);
      background: linear-gradient(180deg, rgba(255,255,255,0.03), rgba(255,255,255,0));
      z-index: -2;
    }
    .home-figure::after {
      content: '';
      position: absolute;
      right: 12%;
      top: 20%;
      width: 78px;
      height: 132px;
      background: linear-gradient(180deg, rgba(193,152,99,0.2), rgba(0,0,0,0.02));
      opacity: 0.5;
      z-index: -1;
    }
    .home-figure img {
      width: 100%;
      display: block;
      object-fit: contain;
      filter: saturate(1.05) contrast(1.02) brightness(0.88) drop-shadow(0 24px 40px rgba(0,0,0,0.38));
      opacity: 0.98;
    }
    .home-figure .signature {
      position: absolute;
      color: rgba(255,255,255,0.32);
      font-size: 0.76rem;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      --sig-x: 0px;
      --sig-y: 0px;
      --sig-scale: 1;
      transform:
        translate(var(--sig-x), var(--sig-y))
        scale(calc(var(--sig-scale) * var(--home-flip)), var(--sig-scale));
      transform-origin: center;
    }
    .home-figure.is-signature-editing .signature {
      color: rgba(255,255,255,0.8);
      text-shadow: 0 0 18px rgba(212,175,123,0.22);
    }
    .home-ring {
      position: absolute;
      border: 1px solid rgba(193,152,99,0.16);
      border-radius: 50%;
      opacity: 0.42;
    }
    .ring-left {
      left: 11%;
      top: 28%;
      width: 180px;
      height: 180px;
    }
    .ring-right {
      right: 11%;
      top: 20%;
      width: 168px;
      height: 168px;
    }
    .line-accent {
      position: absolute;
      height: 1px;
      background: linear-gradient(90deg, transparent, rgba(193,152,99,0.8), transparent);
      opacity: 0.9;
    }
    .line-accent.left {
      left: 4%;
      bottom: 22%;
      width: 210px;
    }
    .line-accent.right {
      right: 4%;
      bottom: 18%;
      width: 220px;
    }
    .figure-left-top { left: 6%; top: 5%; width: clamp(170px, 17vw, 250px); }
    .figure-left-top .signature { left: -2%; bottom: 12%; }
    .figure-left-mid { left: 18%; top: 23%; width: clamp(110px, 11vw, 150px); }
    .figure-left-mid .signature { right: -20%; bottom: -2%; }
    .figure-left-bottom { left: 5%; bottom: 10%; width: clamp(190px, 19vw, 280px); }
    .figure-left-bottom .signature { left: 4%; top: -8%; }
    .figure-right-top { right: 16%; top: 8%; width: clamp(180px, 18vw, 260px); }
    .figure-right-top .signature { right: -6%; bottom: 18%; }
    .figure-right-mid { right: 5%; top: 22%; width: clamp(126px, 12vw, 170px); }
    .figure-right-mid .signature { left: -16%; bottom: 14%; }
    .figure-right-bottom { right: 8%; bottom: 10%; width: clamp(188px, 18vw, 272px); }
    .figure-right-bottom .signature { right: 2%; top: -8%; }
    .figure-bottom-center {
      --figure-base-transform: translateX(-50%);
      left: 50%;
      bottom: 4%;
      width: clamp(124px, 12vw, 176px);
      opacity: 0.82;
    }
    .figure-bottom-center .signature { right: -10%; top: 10%; }
    .home-editor {
      position: fixed;
      top: 18px;
      right: 18px;
      z-index: 24;
      width: min(320px, calc(100vw - 24px));
      padding: 16px;
      border-radius: 18px;
      background: rgba(10,10,10,0.86);
      border: 1px solid rgba(255,255,255,0.1);
      box-shadow: 0 20px 48px rgba(0,0,0,0.38);
      backdrop-filter: blur(18px);
      -webkit-backdrop-filter: blur(18px);
      color: #f6f0e7;
    }
    .home-editor.is-dragging {
      user-select: none;
      cursor: grabbing;
    }
    .home-editor-head {
      margin: -2px -2px 12px;
      padding: 2px 2px 0;
      cursor: grab;
    }
    .home-editor-title {
      font-size: 0.8rem;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      color: rgba(246,240,231,0.92);
      margin-bottom: 6px;
    }
    .home-editor-subtitle {
      font-size: 0.68rem;
      line-height: 1.6;
      color: rgba(246,240,231,0.54);
      margin-bottom: 14px;
    }
    .home-editor-name {
      font-family: var(--font-serif);
      font-size: 1rem;
      line-height: 1.2;
      color: #fff8ef;
      margin-bottom: 12px;
    }
    .home-editor-switcher {
      display: flex;
      gap: 8px;
      margin-bottom: 12px;
    }
    .home-editor-switch-btn {
      flex: 0 0 auto;
      min-width: 56px;
      padding: 9px 10px;
      border-radius: 12px;
      border: 1px solid rgba(255,255,255,0.1);
      background: rgba(255,255,255,0.05);
      color: #f6f0e7;
      font-size: 0.72rem;
      letter-spacing: 0.08em;
      cursor: pointer;
    }
    .home-editor-select {
      flex: 1;
      min-width: 0;
      padding: 9px 12px;
      border-radius: 12px;
      border: 1px solid rgba(255,255,255,0.1);
      background: rgba(255,255,255,0.05);
      color: #f6f0e7;
      font-size: 0.72rem;
      letter-spacing: 0.04em;
      outline: none;
    }
    .home-editor-select option {
      color: #f6f0e7;
      background: #161616;
    }
    .home-editor-row {
      margin-bottom: 12px;
    }
    .home-editor-label {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      font-size: 0.68rem;
      letter-spacing: 0.08em;
      color: rgba(246,240,231,0.7);
      margin-bottom: 6px;
    }
    .home-editor input[type="range"] {
      width: 100%;
      accent-color: #c4956a;
    }
    .home-editor-toggle {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding: 10px 12px;
      border-radius: 12px;
      border: 1px solid rgba(255,255,255,0.08);
      background: rgba(255,255,255,0.04);
    }
    .home-editor-toggle span {
      font-size: 0.68rem;
      letter-spacing: 0.08em;
      color: rgba(246,240,231,0.78);
    }
    .home-editor-toggle input[type="checkbox"] {
      width: 18px;
      height: 18px;
      accent-color: #c4956a;
      cursor: pointer;
    }
    .home-editor-actions {
      display: flex;
      gap: 8px;
      margin: 12px 0;
    }
    .home-editor-btn {
      flex: 1;
      padding: 9px 10px;
      border-radius: 12px;
      border: 1px solid rgba(255,255,255,0.1);
      background: rgba(255,255,255,0.05);
      color: #f6f0e7;
      font-size: 0.68rem;
      letter-spacing: 0.08em;
      cursor: pointer;
    }
    .home-editor-code {
      width: 100%;
      min-height: 172px;
      border-radius: 14px;
      border: 1px solid rgba(255,255,255,0.08);
      background: rgba(255,255,255,0.04);
      color: #f7f2ea;
      padding: 12px;
      font-size: 0.68rem;
      line-height: 1.5;
      resize: vertical;
    }
    .home-editor-tip {
      margin-top: 10px;
      font-size: 0.64rem;
      line-height: 1.55;
      color: rgba(246,240,231,0.5);
    }

    /* ── CARDS — centered fan deck ── */
    .cards {
      display: none;
      position: relative;
      margin-top: 8px;
    }
    .cards.show { display: block; }
    body.result-mode .cards {

    .shuffle-stage {
      position: relative;
      width: min(360px, 78vw);

    .shuffle-shadow {
      position: absolute;
      left: 50%;
      bottom: 18px;
      width: 220px;
      height: 36px;
      transform: translateX(-50%);
      border-radius: 50%;
      background: radial-gradient(circle, rgba(26,26,26,0.15), transparent 72%);
      filter: blur(10px);
    }
    .shuffle-deck {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .shuffle-card {
      position: absolute;
      width: 150px;
      height: 204px;
      border-radius: 24px;
      background:
        linear-gradient(180deg, rgba(255,255,255,0.28), rgba(255,255,255,0.06)),
        linear-gradient(135deg, #2a2725, #4c4037);
      border: 1px solid rgba(255,255,255,0.26);
      box-shadow:
        0 16px 34px rgba(26,26,26,0.22),
        inset 0 1px 0 rgba(255,255,255,0.22);
      overflow: hidden;
      transform-origin: center 84%;
    }
    .shuffle-card::before {
      content: '';
      position: absolute;
      inset: 12px;
      border-radius: 18px;
      border: 1px solid rgba(255,255,255,0.14);
      background:
        radial-gradient(circle at 50% 50%, rgba(196,149,106,0.18), transparent 46%),
        linear-gradient(135deg, rgba(255,255,255,0.06), transparent 52%);
    }
    .shuffle-card::after {
      content: '';
      position: absolute;
      inset: 28px;
      border-radius: 14px;
      border: 1px dashed rgba(196,149,106,0.32);
      opacity: 0.7;
    }
    .shuffle-card-1 { animation: shuffleOne 3s ease-in-out infinite; }
    .shuffle-card-2 { animation: shuffleTwo 3s ease-in-out infinite; }
    .shuffle-card-3 { animation: shuffleThree 3s ease-in-out infinite; }
    .shuffle-card-4 { animation: shuffleFour 3s ease-in-out infinite; }
    @keyframes shuffleOne {
      0%, 100% { transform: translate(0, 0) rotate(0deg); z-index: 4; }
      25% { transform: translate(-70px, -10px) rotate(-14deg); z-index: 6; }
      50% { transform: translate(24px, -16px) rotate(8deg); z-index: 2; }
      75% { transform: translate(-10px, 8px) rotate(-5deg); z-index: 5; }
    }
    @keyframes shuffleTwo {
      0%, 100% { transform: translate(0, 0) rotate(0deg); z-index: 3; }
      20% { transform: translate(72px, -8px) rotate(16deg); z-index: 5; }
      50% { transform: translate(-18px, 10px) rotate(-8deg); z-index: 3; }
      78% { transform: translate(14px, -16px) rotate(4deg); z-index: 6; }
    }
    @keyframes shuffleThree {
      0%, 100% { transform: translate(0, 0) rotate(0deg); z-index: 2; }
      30% { transform: translate(-22px, 12px) rotate(-6deg); z-index: 3; }
      55% { transform: translate(70px, -10px) rotate(14deg); z-index: 6; }
      82% { transform: translate(-8px, -14px) rotate(-3deg); z-index: 2; }
    }
    @keyframes shuffleFour {
      0%, 100% { transform: translate(0, 0) rotate(0deg); z-index: 1; }
      22% { transform: translate(20px, -18px) rotate(6deg); z-index: 4; }
      58% { transform: translate(-74px, -4px) rotate(-15deg); z-index: 5; }
      80% { transform: translate(4px, 12px) rotate(2deg); z-index: 2; }
    }

  return String(value).replace(/[&<>"']/g, (char) => ({

  if (!text) {
    return '请求失败，请稍后重试。';

  if (/Insufficient Balance/i.test(text)) {
    return 'DeepSeek 账户余额不足，推荐卡牌可正常使用，但实时回答暂时无法生成。';
  }
  if (/DEEPSEEK_API_KEY is not configured/i.test(text)) {
    return '后端未配置 DeepSeek API Key，暂时无法生成实时回答。';
  }
  if (/Failed to fetch/i.test(text)) {
    return '无法连接本地后端，请确认 8000 端口服务已启动。';
  }
  return text;
}

function slugifyName(value) {
  return String(value || '')
    .normalize('NFKD')
    .replace(/[\u0300-\u036f]/g, '')
    .replace(/&/g, ' and ')
    .replace(/[^A-Za-z0-9]+/g, '-')
    .replace(/-+/g, '-')
    .replace(/^-|-$/g, '')
    .toLowerCase();
}

function getPosterPalette(key, fallbackKey = '') {
  const seed = `${key || ''}-${fallbackKey || ''}`;
  let hash = 0;
  for (let index = 0; index < seed.length; index += 1) {
    hash = ((hash << 5) - hash) + seed.charCodeAt(index);
    hash |= 0;
  }
  const palette = POSTER_PALETTES[Math.abs(hash) % POSTER_PALETTES.length];
  return palette || POSTER_PALETTES[0];
}

function makeFloatingPanelDraggable(panel, handle) {
  if (!panel || !handle) return;

  let dragState = null;

  function clamp(value, min, max) {
    return Math.min(Math.max(value, min), max);
  }

  function onPointerMove(event) {
    if (!dragState) return;

    const maxLeft = Math.max(12, window.innerWidth - dragState.width - 12);
    const maxTop = Math.max(12, window.innerHeight - dragState.height - 12);
    const nextLeft = clamp(event.clientX - dragState.offsetX, 12, maxLeft);
    const nextTop = clamp(event.clientY - dragState.offsetY, 12, maxTop);

    panel.style.left = `${nextLeft}px`;
    panel.style.top = `${nextTop}px`;
    panel.style.right = 'auto';
  }

  function stopDragging() {
    if (!dragState) return;
    panel.classList.remove('is-dragging');
    dragState = null;
    window.removeEventListener('pointermove', onPointerMove);
    window.removeEventListener('pointerup', stopDragging);
    window.removeEventListener('pointercancel', stopDragging);
  }

  handle.addEventListener('pointerdown', (event) => {
    if (event.button !== 0) return;

    const rect = panel.getBoundingClientRect();
    dragState = {
      offsetX: event.clientX - rect.left,
      offsetY: event.clientY - rect.top,
      width: rect.width,
      height: rect.height
    };

    panel.style.left = `${rect.left}px`;
    panel.style.top = `${rect.top}px`;
    panel.style.right = 'auto';
    panel.classList.add('is-dragging');
    handle.setPointerCapture?.(event.pointerId);
    window.addEventListener('pointermove', onPointerMove);
    window.addEventListener('pointerup', stopDragging);
    window.addEventListener('pointercancel', stopDragging);
  });
}

function toPosterTitle(englishName, chineseName) {
  const cleanEnglish = String(englishName || '')
    .toUpperCase()
    .replace(/[^A-Z\s-]/g, ' ')
    .split(/[\s-]+/)
    .filter(Boolean);

  if (cleanEnglish.length) {
    if (cleanEnglish.length === 1) {
      return cleanEnglish;
    }
    return [
      cleanEnglish[0],
      cleanEnglish.slice(1).join(' ')
    ].slice(0, 2);
  }

  if (!chineseName) {
    return ['AI', 'THINK TANK'];
  }

  if (chineseName.length <= 2) {
    return [chineseName];
  }

  return [chineseName.slice(0, 2), chineseName.slice(2, 4) || ''];
}

function resolveCharacterCutout(englishName, name) {
  const slug = slugifyName(englishName || name);
  if (!slug) return '';
  return `assets/character_cutouts/${slug}.png`;
}

function normalizePortrait(path, englishName, name, domain) {
  const cutout = resolveCharacterCutout(englishName, name);
  if (cutout) {
    return cutout;
  }

  if (path) {
    if (/^(https?:|data:)/.test(path)) {
      return path;
    }
    return path.replace(/^\.?\//, '');
  }

  return buildPortraitFallback(name, domain);
}

async function apiFetch(path, options = {}) {
  const requestOptions = {
    method: options.method || 'GET',
    headers: {
      'Content-Type': 'application/json',
      ...(options.headers || {})
    }
  };

  if (options.body !== undefined) {
    requestOptions.body = typeof options.body === 'string'
      ? options.body
      : JSON.stringify(options.body);
  }

  const response = await fetch(`${API_BASE}${path}`, requestOptions);
  const text = await response.text();
  let payload = {};

  if (text) {
    try {
      payload = JSON.parse(text);
    } catch (error) {
      payload = { detail: text };
    }
  }

  if (!response.ok) {
    throw new Error(normalizeApiErrorMessage(payload.detail || `请求失败（${response.status}）`));
  }

  return payload;
}

async function fetchRecommendedCards() {
  const recommendData = await apiFetch('/recommend', {
    method: 'POST',
    body: {
      question: state.promptQuestion,
      top_k: 4
    }
  });

  const recommendations = (recommendData.recommendations || []).slice(0, 4);
  if (!recommendations.length) {
    throw new Error('后端没有返回可展示的智囊卡牌。');
  }

  const detailResults = await Promise.allSettled(
    recommendations.map((item) => apiFetch(`/people/${encodeURIComponent(item.person_slug)}`))
  );

  return recommendations.map((rec, index) => {
    const detailResult = detailResults[index];
    const detail = detailResult.status === 'fulfilled'
      ? detailResult.value
      : {
          slug: rec.person_slug,
          english_name: rec.person_name,
          chinese_name: rec.person_name,
          domain_category: 'default',
          ai_archetype: '',
          brief_intro: rec.reason,
          portrait_asset: null,
          is_fictional: false,
          era_context: null,
          status: 'active',
          preferred_topics: [],
          persona_traits: []
        };

    return buildCardViewModel(rec, detail);
  });
}

    const figureId = node.dataset.figureId;
    const displayName = node.querySelector('.signature')?.textContent?.trim() || figureId;
    return [
      { value: `${figureId}:figure`, id: figureId, kind: 'figure', name: `${displayName} / 人物` },
      { value: `${figureId}:signature`, id: figureId, kind: 'signature', name: `${displayName} / 名字` }
    ];
  });

  figureSelect.innerHTML = figureOptions
    .map((item) => `<option value="${escapeHTML(item.value)}">${escapeHTML(item.name)}</option>`)
    .join('');

  function getSelectedTarget() {
    return figureOptions.find((item) => item.value === selectedTargetValue) || figureOptions[0];
  }

  function selectFigureByOffset(step) {
    const currentIndex = figureOptions.findIndex((item) => item.value === selectedTargetValue);
    const nextIndex = (currentIndex + step + figureOptions.length) % figureOptions.length;
    selectedTargetValue = figureOptions[nextIndex].value;
    refreshPanel();
  }

  function refreshPanel() {
    const selectedTarget = getSelectedTarget();
    if (!selectedTarget) return;
    const activeNode = figureNodes.find((node) => node.dataset.figureId === selectedTarget.id);
    if (!activeNode) return;
    const displayName = activeNode.querySelector('.signature')?.textContent?.trim() || selectedTarget.id;
    const adjustment = selectedTarget.kind === 'figure'
      ? getHomeFigureAdjustments(selectedTarget.id)
      : getHomeSignatureAdjustments(selectedTarget.id);
    nameEl.textContent = `${displayName} / ${selectedTarget.kind === 'figure' ? '人物' : '名字'} / ${selectedTarget.id}`;
    figureSelect.value = selectedTarget.value;
    scaleInput.value = String(adjustment.scale);
    xInput.value = String(adjustment.x);
    yInput.value = String(adjustment.y);
    flipInput.checked = Boolean(adjustment.flip);
    flipRow.style.display = selectedTarget.kind === 'figure' ? 'block' : 'none';
    scaleValueEl.textContent = Number(adjustment.scale).toFixed(2);
    xValueEl.textContent = `${adjustment.x}px`;
    yValueEl.textContent = `${adjustment.y}px`;
    codeEl.value = buildHomeAdjustmentCode();
    figureNodes.forEach((node) => {
      node.classList.toggle('is-editing', selectedTarget.kind === 'figure' && node.dataset.figureId === selectedTarget.id);
      node.classList.toggle('is-signature-editing', selectedTarget.kind === 'signature' && node.dataset.figureId === selectedTarget.id);
    });
  }

  function updateCurrentTarget(partial) {
    const selectedTarget = getSelectedTarget();
    if (!selectedTarget) return;
    const activeNode = figureNodes.find((node) => node.dataset.figureId === selectedTarget.id);
    if (!activeNode) return;
    const next = selectedTarget.kind === 'figure'
      ? { ...getHomeFigureAdjustments(selectedTarget.id), ...partial }
      : { ...getHomeSignatureAdjustments(selectedTarget.id), ...partial };

    if (selectedTarget.kind === 'figure') {
      state.homeFigureAdjustments[selectedTarget.id] = next;
      saveHomeFigureAdjustments();
      applyHomeFigureAdjustment(activeNode, next);
    } else {
      state.homeSignatureAdjustments[selectedTarget.id] = next;
      saveHomeSignatureAdjustments();
      applyHomeSignatureAdjustment(activeNode, next);
    }
    refreshPanel();
  }

  scaleInput.addEventListener('input', () => {
    updateCurrentTarget({ scale: Number(scaleInput.value) });
  });
  xInput.addEventListener('input', () => {
    updateCurrentTarget({ x: Number(xInput.value) });
  });
  yInput.addEventListener('input', () => {
    updateCurrentTarget({ y: Number(yInput.value) });
  });
  flipInput.addEventListener('change', () => {
    updateCurrentTarget({ flip: Boolean(flipInput.checked) });
  });

  resetCurrentBtn.addEventListener('click', () => {
    const selectedTarget = getSelectedTarget();
    if (!selectedTarget) return;
    const activeNode = figureNodes.find((node) => node.dataset.figureId === selectedTarget.id);
    if (!activeNode) return;

    if (selectedTarget.kind === 'figure') {
      const fallback = {
        scale: HOME_FIGURE_ADJUSTMENTS[selectedTarget.id]?.scale ?? 1,
        x: HOME_FIGURE_ADJUSTMENTS[selectedTarget.id]?.x ?? 0,
        y: HOME_FIGURE_ADJUSTMENTS[selectedTarget.id]?.y ?? 0,
        flip: Boolean(HOME_FIGURE_ADJUSTMENTS[selectedTarget.id]?.flip)
      };
      state.homeFigureAdjustments[selectedTarget.id] = fallback;
      saveHomeFigureAdjustments();
      applyHomeFigureAdjustment(activeNode, fallback);
    } else {
      const fallback = {
        scale: HOME_SIGNATURE_ADJUSTMENTS[selectedTarget.id]?.scale ?? 1,
        x: HOME_SIGNATURE_ADJUSTMENTS[selectedTarget.id]?.x ?? 0,
        y: HOME_SIGNATURE_ADJUSTMENTS[selectedTarget.id]?.y ?? 0
      };
      state.homeSignatureAdjustments[selectedTarget.id] = fallback;
      saveHomeSignatureAdjustments();
      applyHomeSignatureAdjustment(activeNode, fallback);
    }
    refreshPanel();
  });

  copyBtn.addEventListener('click', async () => {
    const value = buildHomeAdjustmentCode();
    codeEl.value = value;
    codeEl.select();
    try {
      await navigator.clipboard.writeText(value);
      copyBtn.textContent = '已复制';
      setTimeout(() => {
        copyBtn.textContent = '复制代码';
      }, 1200);
    } catch (error) {
      document.execCommand('copy');
    }
  });

  prevFigureBtn.addEventListener('click', () => {
    selectFigureByOffset(-1);
  });

  nextFigureBtn.addEventListener('click', () => {
    selectFigureByOffset(1);
  });

  figureSelect.addEventListener('change', () => {
    selectedTargetValue = figureSelect.value;
    refreshPanel();
  });

  figureNodes.forEach((node) => {
    applyHomeFigureAdjustment(node, getHomeFigureAdjustments(node.dataset.figureId));
    applyHomeSignatureAdjustment(node, getHomeSignatureAdjustments(node.dataset.figureId));
    node.addEventListener('click', () => {
      selectedTargetValue = `${node.dataset.figureId}:figure`;
      refreshPanel();
    });
  });

  refreshPanel();
}

function buildPortraitAdjustmentCode() {
  const activeSlugs = new Set((state.currentCards || []).map((card) => card.slug));
  const filtered = Object.fromEntries(
    Object.entries(state.portraitAdjustments || {}).filter(([slug]) => activeSlugs.has(slug))
  );
  return `const PORTRAIT_ADJUSTMENTS = ${JSON.stringify(filtered, null, 2)};`;
}

function applyPortraitAdjustmentToCard(cardNode, adjustment) {
  if (!cardNode) return;
  cardNode.style.setProperty('--portrait-scale', String(adjustment.scale ?? 1));
  cardNode.style.setProperty('--portrait-x', `${adjustment.x ?? 0}px`);
  cardNode.style.setProperty('--portrait-y', `${adjustment.y ?? 0}px`);
  cardNode.style.setProperty('--portrait-flip', adjustment.flip ? '-1' : '1');
}

function syncPortraitAdjustmentForIndex(index) {
  const cardData = state.currentCards[index];
  const cardNode = cardsEl.querySelector(`.card[data-index="${index}"]`);
  if (!cardData || !cardNode) return;
  applyPortraitAdjustmentToCard(cardNode, getPortraitAdjustments(cardData.slug));
}

  const citationsEl = cardNode.querySelector('.back-citations');

  answerTitleEl.textContent = buildAnswerTitle(cardData);
  answerEl.textContent = buildQuote(cardData);
  if (expEl) {
    expEl.textContent = buildBackFooter(cardData);
  }
  citationsEl.innerHTML = buildCitationMarkup(cardData);
  // #region debug-point D:sync-card-dom
  reportCardDebug('D', 'syncCardDOM', {
    index,
    slug: cardData.slug,
    hasAnswer: Boolean(cardData.answer),
    loadingAnswer: Boolean(cardData.loadingAnswer),
    hasError: Boolean(cardData.error),
    citationCount: Array.isArray(cardData.citations) ? cardData.citations.length : 0
  });
  // #endregion

async function fetchAnswerForCard(cardData) {
  const response = await apiFetch('/chat/respond', {
    method: 'POST',
    body: {
      person_slug: cardData.slug,
      question: buildAnswerRequestQuestion(state.promptQuestion),
      history: [],
      conversation_id: cardData.conversationId
    }
  });

  cardData.answer = (response.answer || '').trim();
  cardData.conversationId = response.conversation_id || null;
  cardData.citations = response.citations || [];
}

async function preloadCardAnswers(cardItems) {
  const settled = await Promise.allSettled(
    cardItems.map(async (cardData) => {
      cardData.loadingAnswer = true;
      cardData.error = '';
      try {
        await fetchAnswerForCard(cardData);
      } catch (error) {
        cardData.error = normalizeApiErrorMessage(error.message || '获取回答失败，请稍后重试。');
      } finally {
        cardData.loadingAnswer = false;
      }
    })
  );

  return settled;
}

async function ensureCardAnswer(index) {
  const cardData = state.currentCards[index];
  if (!cardData || cardData.loadingAnswer || cardData.answer) {
    return;
  }

  cardData.loadingAnswer = true;
  cardData.error = '';
  syncCardDOM(index);

  try {
    await fetchAnswerForCard(cardData);
    showStatus(`已接入后端：${cardData.name} 的回答已生成。`, 'success');
  } catch (error) {
    cardData.error = normalizeApiErrorMessage(error.message || '获取回答失败，请稍后重试。');
  } finally {
    cardData.loadingAnswer = false;
    syncCardDOM(index);
  }
}

                      <div class="back-section back-answer-section">
                        <div class="back-answer-title">
                          <div class="back-section-label back-answer-label">${escapeHTML(buildAnswerTitle(card))}</div>
                        </div>
                        <div class="back-answer">${escapeHTML(buildQuote(card))}</div>
                      </div>

                      <div class="back-section">
                        <div class="back-section-label">人物视角</div>
                        <div class="back-meta">${buildBackMeta(card)}</div>
                        <div class="back-intro" style="margin-top:10px;">${escapeHTML(card.intro || card.title)}</div>
                      </div>

                      <div class="back-section">
                        <div class="back-section-label">推荐理由</div>
                        <div class="back-rationale">${escapeHTML(card.reason)}</div>
                      </div>

                      <div class="back-section">
                        <div class="back-section-label">关键词</div>
                        <div class="back-keywords-text">${buildBackKeywordText(card)}</div>
                      </div>

                      ${card.citations.length ? `
                      <div class="back-section">
                        <div class="back-section-label">参考依据</div>
                        <div class="back-citations">${buildCitationMarkup(card)}</div>
                      </div>
                      ` : ''}

                    </div>
                    <div class="back-scroll-cue">向下滑动</div>
                  </div>
                </div>
              </div>
            </div>
          </div>
        `;
        }).join('')}
        </div>
      </div>
      <div class="scroll-hint" id="scrollHint">
        <span>左右滑动</span>
        <svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5">
          <path d="M3 8h10M9 4l4 4-4 4"/>
        </svg>
      </div>
    </div>
  `;
  applyAllBackQuoteAdjustments();

  const stage = document.getElementById('cardsStage');
  const track = document.getElementById('cardsTrack');
  const scrollHint = document.getElementById('scrollHint');
  const deckHint = document.getElementById('deckHint');
  const cards = Array.from(stage.querySelectorAll('.card'));
  let isSpread = false;
  let activeIndex = 0;
  let flippedIndex = -1;
  let isDragging = false;
  let suppressClick = false;
  let pendingDrag = false;
  let startX = 0;
  let startY = 0;
  let startScrollLeft = 0;

  // #region debug-point B:render-cards
  reportCardDebug('B', 'renderCards:init', {
    count: cardItems.length,
    slugs: cardItems.map((item) => item.slug)
  });
  // #endregion

  function focusCard(index, smooth = true) {
    activeIndex = index;
    cards.forEach((card, cardIndex) => {
      card.classList.toggle('is-active', isSpread && cardIndex === index);
    });

    if (isSpread && cards[index]) {
      cards[index].scrollIntoView({
        behavior: smooth ? 'smooth' : 'auto',
        inline: 'center',
        block: 'nearest'
      });
    }
  }

  function setFlipped(index, shouldFlip) {
    cards.forEach((card, cardIndex) => {
      card.classList.toggle('is-flipped', shouldFlip && cardIndex === index);
    });
    flippedIndex = shouldFlip ? index : -1;
    // #region debug-point C:set-flipped
    reportCardDebug('C', 'setFlipped', {
      index,
      shouldFlip,
      flippedIndex,
      activeIndex,
      isSpread
    });
    // #endregion
  }

  function setSpread(nextSpread, smooth = true) {
    isSpread = nextSpread;
    stage.classList.toggle('spread', nextSpread);
    stage.classList.toggle('stack-mode', !nextSpread);
    scrollHint.classList.toggle('show', nextSpread);
    deckHint.textContent = nextSpread
      ? '左右拖动浏览牌阵 · 现在点击任意单张卡牌可翻到背面查看回答'
      : '牌阵已收拢 · 点击这叠卡牌展开查看';
    // #region debug-point A:set-spread
    reportCardDebug('A', 'setSpread', {
      nextSpread,
      smooth,
      activeIndex,
      flippedIndex
    });
    // #endregion

    if (nextSpread) {
      setFlipped(-1, false);
      requestAnimationFrame(() => {
        cards.forEach((card) => card.classList.remove('is-active'));
      });
    } else {
      cards.forEach((card) => card.classList.remove('is-active'));
      setFlipped(-1, false);
      track.scrollTo({ left: 0, behavior: smooth ? 'smooth' : 'auto' });
    }
  }

  track.addEventListener('pointerdown', (event) => {
    if (!isSpread) return;
    pendingDrag = true;
    isDragging = false;
    suppressClick = false;
    startX = event.clientX;
    startY = event.clientY;
    startScrollLeft = track.scrollLeft;
  });

  track.addEventListener('pointermove', (event) => {
    if (!pendingDrag && !isDragging) return;
    const deltaX = event.clientX - startX;
    const deltaY = event.clientY - startY;
    if (!isDragging && Math.abs(deltaX) > 6 && Math.abs(deltaX) > Math.abs(deltaY)) {
      isDragging = true;
      suppressClick = true;
      if (track.setPointerCapture) {
        track.setPointerCapture(event.pointerId);
      }
      track.classList.add('is-dragging');
    }
    if (!isDragging) return;
    if (Math.abs(deltaX) > 6) {
      suppressClick = true;
    }
    track.scrollLeft = startScrollLeft - deltaX;
  });

  track.addEventListener('wheel', (event) => {
    if (!isSpread) return;
    const delta = Math.abs(event.deltaX) > Math.abs(event.deltaY) ? event.deltaX : event.deltaY;
    if (!delta) return;
    event.preventDefault();
    track.scrollLeft += delta;
  }, { passive: false });

  function stopDragging(event) {
    if (isDragging && event && track.releasePointerCapture) {
      try {
        track.releasePointerCapture(event.pointerId);
      } catch (error) {
        // Ignore release errors when capture is already cleared.
      }
    }
    pendingDrag = false;
    isDragging = false;
    track.classList.remove('is-dragging');
    setTimeout(() => {
      suppressClick = false;
    }, 30);
  }

  track.addEventListener('pointerup', stopDragging);
  track.addEventListener('pointerleave', stopDragging);
  track.addEventListener('pointercancel', stopDragging);
  async function handleCardInteraction(index, eventMeta = {}) {
    // #region debug-point A:handle-card-interaction
    reportCardDebug('A', 'handleCardInteraction', {
      index,
      isSpread,
      suppressClick,
      flippedIndex,
      activeIndex,
      source: eventMeta.source || 'unknown'
    });
    // #endregion
    if (suppressClick) return;
    if (!isSpread) {
      focusCard(index, false);
      setSpread(true, false);
      return;
    }

    focusCard(index, false);
    if (flippedIndex === index) {
      setFlipped(index, false);
    } else {
      setFlipped(index, true);
      await ensureCardAnswer(index);
    }
  }

  track.addEventListener('click', async (event) => {
    if (suppressClick) return;
    const hit = document.elementFromPoint(event.clientX, event.clientY);
    const card = hit?.closest?.('.card');
    if (!card || !track.contains(card)) return;
    const index = Number(card.dataset.index);
    await handleCardInteraction(index, { source: 'track-click' });
  });

  cards.forEach((card) => {
    const backScroll = card.querySelector('.back-scroll');

    ['pointerdown', 'click', 'wheel', 'touchstart', 'touchmove'].forEach((eventName) => {
      backScroll?.addEventListener(eventName, (event) => {
        event.stopPropagation();
      }, { passive: eventName === 'wheel' ? false : true });
    });

    card.addEventListener('mousemove', (event) => {
      const rect = card.getBoundingClientRect();
      const mx = ((event.clientX - rect.left) / rect.width * 100).toFixed(1);
      const my = ((event.clientY - rect.top) / rect.height * 100).toFixed(1);
      const rotateY = (((event.clientX - rect.left) / rect.width) - 0.5) * 10;
      const rotateX = (((event.clientY - rect.top) / rect.height) - 0.5) * -8;
      card.style.setProperty('--mx', `${mx}%`);
      card.style.setProperty('--my', `${my}%`);
      card.style.setProperty('--tilt-x', `${rotateX.toFixed(2)}deg`);
      card.style.setProperty('--tilt-y', `${rotateY.toFixed(2)}deg`);
    });

    card.addEventListener('mouseleave', () => {
      card.style.setProperty('--mx', '50%');
      card.style.setProperty('--my', '50%');
      card.style.setProperty('--tilt-x', '0deg');
      card.style.setProperty('--tilt-y', '0deg');
    });
  });

  cards.forEach((card) => card.classList.remove('is-active'));
  let previewSelectCard = () => {};
  setTimeout(() => {
    stage.classList.remove('is-dealing');
  }, 3400);

  if (PREVIEW_CARD_MODE) {
    setSpread(true, false);
    if (PREVIEW_EDIT_MODE) {
      previewSelectCard = (index) => {
        cards.forEach((card, cardIndex) => {
          card.classList.toggle('is-editing', cardIndex === index);
        });
      };
      setupPreviewEditor({
        cards,
        focusCard,
        setSpread,
        onSelect: previewSelectCard
      });
    }
  }
}

async function generateCards() {
  if (PREVIEW_CARD_MODE) {
    state.question = input.value.trim();
    if (state.question.length < MIN_QUESTION_LENGTH) return;
    state.promptQuestion = buildPromptQuestion();
    await openPreviewCardsPage(state.promptQuestion);
    return;
  }

  state.question = input.value;
  if (state.question.trim().length < MIN_QUESTION_LENGTH || state.requestInFlight) return;

  state.promptQuestion = buildPromptQuestion();
  state.requestInFlight = true;
  submitBtn.disabled = true;
  showStatus('正在连接后端推荐接口...', '');
  loadingText.textContent = '智囊团正在洗牌';
  loadingSub.textContent = '正在同步生成 4 位智囊的简短回答...';

  document.body.classList.add('result-mode');
  inputSection.style.display = 'none';
  loading.classList.add('show');
  cardsEl.classList.remove('show');
  resetBtn.classList.remove('show');

  try {
    // Let the browser paint the loading overlay before kicking off network work.
    await nextFrame();
    await wait(80);

    const recommendedCards = await fetchRecommendedCards();
    loadingSub.textContent = '推荐已完成，正在把每位智囊的短回答收进牌堆...';
    await Promise.all([
      preloadCardAnswers(recommendedCards),
      wait(MIN_SHUFFLE_DURATION)
    ]);
    state.currentCards = recommendedCards;
    loading.classList.remove('show');
    renderCards(state.currentCards);
    cardsEl.classList.add('show');
    resetBtn.classList.add('show');
    showStatus('后端联调成功：推荐人物与简短回答已在洗牌阶段生成。', 'success');

    setTimeout(() => {
      cardsEl.scrollIntoView({ behavior: 'smooth', block: 'start' });
    }, 120);
  } catch (error) {
    loading.classList.remove('show');
    document.body.classList.remove('result-mode');
    inputSection.style.display = 'block';
    removeHomeFigureEditor();
    showStatus(normalizeApiErrorMessage(error.message || '联调失败，请检查本地后端服务。'), 'error');
  } finally {
    loadingText.textContent = '智囊团正在洗牌';
    loadingSub.textContent = '正在快速生成 4 位智囊的短回答...';
    state.requestInFlight = false;
    submitBtn.disabled = input.value.trim().length < MIN_QUESTION_LENGTH;
  }
}

// ─── INPUT ───
input.addEventListener('input', function() {
  state.question = this.value;
  charCount.textContent = state.question.length;
  submitBtn.disabled = state.question.trim().length < MIN_QUESTION_LENGTH;
  if (apiStatus.textContent) {
    showStatus('', '');
  }
});

input.addEventListener('compositionstart', () => {
  isInputComposing = true;
});

input.addEventListener('compositionend', () => {
  isInputComposing = false;
});

input.addEventListener('keydown', (event) => {
  if (isInputComposing) {
    return;
  }
  if ((event.key === 'Enter' || event.key === 'NumpadEnter') && !event.shiftKey) {
    event.preventDefault();
    generateCards();
    return;
  }
  if ((event.metaKey || event.ctrlKey) && (event.key === 'Enter' || event.key === 'NumpadEnter')) {
    generateCards();
  }
});

chips.forEach((chip) => {
  chip.addEventListener('click', () => {
    const isSelected = chip.classList.contains('selected');
    chips.forEach((item) => item.classList.remove('selected'));
    if (isSelected) {
      state.category = '';
      return;
    }
    chip.classList.add('selected');
    state.category = chip.dataset.cat;
  });
});

submitBtn.addEventListener('click', generateCards);

function resetAll() {
  state.question = '';
  state.category = '';
  state.promptQuestion = '';
  state.currentCards = [];
  state.requestInFlight = false;
  document.body.classList.remove('result-mode');
  input.value = '';
  charCount.textContent = '0';
  chips.forEach((chip) => chip.classList.remove('selected'));
  submitBtn.disabled = true;
  cardsEl.innerHTML = '';
  cardsEl.classList.remove('show');
  resetBtn.classList.remove('show');
  inputSection.style.display = 'block';
  applyAllHomeFigureAdjustments();
  removeHomeFigureEditor();
  showStatus('', '');
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

applyAllHomeFigureAdjustments();
removeHomeFigureEditor();
if (PREVIEW_CARD_MODE) {
  showStatus('当前为本地预览模式：生成卡牌不会请求 API。切回接口模式可用 `?mode=api` 或执行 `__setAppMode("api")`。', 'success');
}
submitBtn.disabled = input.value.trim().length < MIN_QUESTION_LENGTH;

</script>
